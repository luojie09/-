<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>留言墙预览</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@500;600;700&family=Playfair+Display:wght@500;600;700&display=swap');

    :root{
      --bg:#fffdfd;
      --bg-top:#fff6f8;
      --surface:rgba(255,255,255,.94);
      --surface-strong:#fffdfd;
      --line:#f2eaee;
      --line-soft:#f6eff2;
      --ink:#1d1d1f;
      --muted:#8f8991;
      --pink:#ff6f95;
      --pink-soft:#ffe3eb;
      --shadow:0 2px 10px rgba(40,24,32,.05);
      --radius-xl:22px;
      --radius-lg:18px;
      --radius-md:14px;
      --phone-width:393px;
      --phone-height:852px;
      --font-body:"Inter","Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;
      --font-heading:"Playfair Display","Noto Serif SC","PingFang SC","Microsoft YaHei",serif;
      --font-number:var(--font-body);
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      background:#f6f1f3;
      font-family:var(--font-body);
      color:var(--ink);
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
      font-kerning:normal;
    }
    body{min-height:100vh;padding:24px 12px;display:flex;justify-content:center}

    .phone{
      width:min(100%,var(--phone-width));
      min-height:var(--phone-height);
      background:linear-gradient(180deg,var(--bg-top) 0%, var(--bg) 100%);
      border-radius:38px;
      border:1px solid rgba(255,255,255,.88);
      overflow:hidden;
      box-shadow:0 14px 36px rgba(42,26,35,.10);
      position:relative;
    }

    .scroll{
      min-height:100%;
      padding:calc(18px + env(safe-area-inset-top)) 20px calc(28px + env(safe-area-inset-bottom));
    }

    .topbar{
      display:grid;
      grid-template-columns:44px 1fr 44px;
      align-items:center;
      margin-bottom:18px;
    }

    .topbar h1{
      margin:0;
      text-align:center;
      font-size:21px;
      font-family:var(--font-heading);
      font-weight:700;
      letter-spacing:0;
    }

    .icon-circle{
      width:44px;
      height:44px;
      border-radius:50%;
      border:1px solid rgba(236,230,234,.9);
      background:rgba(255,255,255,.82);
      display:grid;
      place-items:center;
      box-shadow:0 1px 6px rgba(53,37,45,.04);
      color:var(--pink);
      cursor:pointer;
      backdrop-filter:blur(12px);
    }

    .icon-circle.back{color:var(--ink)}
    .icon-circle svg{width:22px;height:22px;display:block}

    .empty-state{
      padding:30px 8px 12px;
      text-align:center;
    }

    .empty-ill{
      width:100%;
      height:136px;
      display:flex;
      align-items:center;
      justify-content:center;
      margin-bottom:14px;
    }

    .empty-ill img{
      width:100%;
      height:100%;
      object-fit:contain;
    }

    .empty-state h3{
      margin:0 0 8px;
      font-size:22px;
      font-family:var(--font-heading);
      font-weight:700;
    }

    .empty-state p{
      margin:0 0 16px;
      font-size:14px;
      line-height:1.6;
      color:var(--muted);
    }

    .primary-btn{
      border:none;
      background:var(--pink);
      color:#fff;
      font:700 16px/1 var(--font-body);
      padding:12px 20px;
      border-radius:999px;
      cursor:pointer;
    }

    .feed{
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    .message-card{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:var(--radius-xl);
      box-shadow:var(--shadow);
      padding:18px;
    }

    .message-head{
      display:flex;
      align-items:flex-start;
      gap:10px;
    }

    .avatar{
      width:42px;
      height:42px;
      border-radius:50%;
      border:1px solid #f2eaee;
      background:#fff;
      overflow:hidden;
      flex:none;
    }

    .avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .author{
      flex:1;
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:4px;
      padding-top:1px;
    }

    .author-name{
      font-size:18px;
      font-family:var(--font-heading);
      font-weight:700;
      line-height:1.2;
      letter-spacing:-.008em;
    }

    .author-time{
      font-size:12px;
      line-height:1.4;
      color:var(--muted);
      font-family:var(--font-number);
      font-variant-numeric:tabular-nums;
    }

    .text-btn{
      border:none;
      background:none;
      color:var(--muted);
      font:inherit;
      cursor:pointer;
      padding:0;
    }

    .more-wrap{position:relative}
    .more-btn{
      width:28px;
      height:28px;
      display:grid;
      place-items:center;
      font-size:10px;
      letter-spacing:.02em;
      line-height:1;
      color:rgba(143,137,145,.48);
    }

    .more-menu{
      position:absolute;
      right:0;
      top:34px;
      width:118px;
      padding:8px;
      border-radius:18px;
      border:1px solid var(--line);
      background:#fff;
      box-shadow:0 14px 32px rgba(61,30,40,.10);
      display:none;
      z-index:9;
    }

    .more-menu.show{display:block}
    .more-menu button{
      width:100%;
      text-align:left;
      padding:10px 12px;
      border-radius:12px;
      border:none;
      background:none;
      cursor:pointer;
      font:500 13px/1.2 var(--font-body);
      color:var(--ink);
    }

    .more-menu button:hover{background:#fff6f8}
    .more-menu button.danger{color:var(--pink)}

    .message-content{
      margin:14px 0 0;
      font-size:15px;
      line-height:1.72;
      font-weight:500;
    }

    .message-images{
      width:100%;
      margin-top:16px;
      display:grid;
      gap:8px;
    }

    .message-images > div{min-width:0}
    .message-images.cols-1{grid-template-columns:minmax(0,1fr)}
    .message-images.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}
    .message-images.cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}

    .media{
      width:100%;
      min-width:0;
      overflow:hidden;
      border-radius:16px;
      aspect-ratio:1 / 1;
      position:relative;
      border:1px solid var(--line-soft);
      background:#f8f5f7;
      cursor:pointer;
    }

    .media.single{
      aspect-ratio:1.5;
      border-radius:18px;
    }

    .media img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .mock-photo{
      position:absolute;
      inset:0;
      overflow:hidden;
    }

    .mock-photo::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 78% 18%, rgba(255,255,255,.42), transparent 30%),
        radial-gradient(circle at 24% 68%, rgba(255,255,255,.16), transparent 28%);
    }

    .mock-photo::after{
      content:attr(data-label);
      position:absolute;
      left:10px;
      top:10px;
      color:rgba(255,255,255,.94);
      font-size:10px;
      font-weight:700;
      letter-spacing:.08em;
    }

    .mock-blossom{background:linear-gradient(135deg,#7eb5f0,#ffcde2)}
    .mock-sunset-gold{background:linear-gradient(135deg,#7a8fd6,#ffb56b)}
    .mock-sunset-shore{background:linear-gradient(135deg,#f5b48a,#7ec8e3)}
    .mock-note{background:linear-gradient(135deg,#f6d6ff,#ffd6e8)}

    .message-actions{
      margin-top:16px;
      display:flex;
      align-items:center;
      gap:16px;
      color:var(--muted);
    }

    .message-actions button,
    .reply-toggle{
      border:none;
      background:none;
      padding:0;
      display:flex;
      align-items:center;
      gap:6px;
      color:inherit;
      font:500 13px/1.2 var(--font-body);
      cursor:pointer;
      font-variant-numeric:tabular-nums;
    }

    .message-actions svg{width:18px;height:18px}
    .message-actions .heart svg{color:var(--pink)}

    .reply-list{
      position:relative;
      margin-top:14px;
      padding-left:16px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .reply-list::before{
      content:"";
      position:absolute;
      left:2px;
      top:6px;
      bottom:6px;
      width:1px;
      background:#efe7eb;
    }

    .reply-item{
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    .reply-meta{
      display:flex;
      align-items:center;
      gap:6px;
      flex-wrap:wrap;
    }

    .reply-name{
      font-size:14px;
      font-family:var(--font-heading);
      font-weight:700;
      color:var(--ink);
    }

    .reply-target{
      font-size:11px;
      font-weight:500;
      color:rgba(255,111,149,.84);
    }

    .reply-time{
      font-size:11px;
      color:var(--muted);
      font-family:var(--font-number);
      font-variant-numeric:tabular-nums;
    }

    .reply-content{
      font-size:14px;
      line-height:1.58;
      color:#45464d;
    }

    .reply-item button.delete{
      border:none;
      background:none;
      color:var(--muted);
      font-size:11px;
      cursor:pointer;
      padding:0;
    }

    .reply-box{
      margin-top:14px;
      border-radius:16px;
      background:#faf7f8;
      border:1px solid var(--line);
      padding:10px 12px;
    }

    .reply-box textarea,
    .edit-sheet textarea{
      width:100%;
      border:none;
      outline:none;
      resize:none;
      background:transparent;
      padding:0;
      color:var(--ink);
      font:500 15px/1.5 var(--font-body);
    }

    .reply-box textarea{min-height:22px}
    .reply-box textarea::placeholder,
    .edit-sheet textarea::placeholder{color:var(--muted)}

    .reply-actions{
      display:flex;
      justify-content:flex-end;
      align-items:center;
      gap:8px;
      margin-top:8px;
    }

    .reply-send{
      width:32px;
      height:32px;
      border:none;
      border-radius:50%;
      display:grid;
      place-items:center;
      background:#f0eaed;
      color:var(--muted);
      cursor:pointer;
    }

    .reply-send.active{
      background:var(--pink);
      color:#fff;
    }

    .reply-send svg{width:15px;height:15px}

    .viewer,
    .edit-overlay,
    .confirm-overlay{
      position:fixed;
      inset:0;
      background:rgba(18,17,21,.78);
      display:none;
      align-items:center;
      justify-content:center;
      padding:0;
      z-index:99;
    }

    .viewer.show,
    .edit-overlay.show,
    .confirm-overlay.show{display:flex}

    .viewer-shell{
      width:100%;
      height:100%;
      display:flex;
      flex-direction:column;
    }

    .viewer-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      color:#fff;
      font-weight:700;
      padding:22px 18px 0;
    }

    .viewer-stage{
      position:relative;
      width:100%;
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#18151b;
      overflow:hidden;
    }

    .viewer-stage .media{
      width:100%;
      height:100%;
      border:none;
      border-radius:0;
      background:transparent;
      cursor:default;
    }

    .viewer-stage .media img{object-fit:contain}
    .viewer-stage .mock-photo{
      inset:24px;
      border-radius:28px;
    }

    .viewer-nav{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      width:42px;
      height:42px;
      border:none;
      border-radius:50%;
      background:rgba(255,255,255,.16);
      color:#fff;
      cursor:pointer;
      font-size:18px;
    }

    .viewer-nav.prev{left:12px}
    .viewer-nav.next{right:12px}

    .sheet{
      width:min(100%,408px);
      border-radius:24px;
      background:#fff;
      box-shadow:0 18px 44px rgba(33,18,24,.20);
      padding:18px;
    }

    .sheet h3{
      margin:0 0 10px;
      font-size:20px;
    }

    .sheet p{
      margin:0 0 16px;
      color:var(--muted);
      line-height:1.6;
    }

    .sheet-actions{
      display:flex;
      justify-content:flex-end;
      gap:12px;
      margin-top:12px;
    }

    .hidden{display:none!important}
  </style>
</head>
<body>
  <div class="phone">
    <div class="scroll">
      <div class="topbar">
        <button class="icon-circle back" type="button" title="返回" aria-label="返回">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 5L7.5 12L14.5 19"/></svg>
        </button>
        <h1>留言墙</h1>
        <button class="icon-circle" id="openEditorBtn" type="button" title="写留言" aria-label="写留言">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20H21"/><path d="M16.5 3.5A2.1 2.1 0 0 1 19.5 6.5L8 18L3 19L4 14L16.5 3.5Z"/></svg>
        </button>
      </div>

      <section class="empty-state hidden" id="emptyState">
        <div class="empty-ill">
          <img src="../app/src/main/res/drawable-nodpi/home_couple_hero.webp" alt="小羊和小耶插画" />
        </div>
        <h3>这里还没有留言</h3>
        <p>写下第一句只属于我们的悄悄话吧</p>
        <button class="primary-btn" id="emptyWriteBtn" type="button">写留言</button>
      </section>

      <section class="feed" id="feed"></section>
    </div>
  </div>

  <div class="viewer" id="viewer">
    <div class="viewer-shell">
      <div class="viewer-top">
        <button class="icon-circle" type="button" id="viewerClose" aria-label="关闭">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round"><path d="M6 6L18 18"/><path d="M18 6L6 18"/></svg>
        </button>
        <div id="viewerCount">1 / 1</div>
        <div style="width:44px"></div>
      </div>
      <div class="viewer-stage" id="viewerStage"></div>
    </div>
  </div>

  <div class="edit-overlay" id="editOverlay">
    <div class="sheet edit-sheet">
      <h3>编辑留言</h3>
      <textarea id="editInput" maxlength="500" placeholder="把这句心里话再润一润…"></textarea>
      <div class="sheet-actions">
        <button class="text-btn" type="button" id="editCancel">取消</button>
        <button class="primary-btn" type="button" id="editSave">保存</button>
      </div>
    </div>
  </div>

  <div class="confirm-overlay" id="confirmOverlay">
    <div class="sheet">
      <h3 id="confirmTitle"></h3>
      <p id="confirmText"></p>
      <div class="sheet-actions">
        <button class="text-btn" type="button" id="confirmCancel">取消</button>
        <button class="primary-btn" type="button" id="confirmOk">删除</button>
      </div>
    </div>
  </div>

  <script>
    const currentUserId = "sheep";
    const currentUserName = "小羊";
    const avatars = {
      sheep: "../app/src/main/res/drawable-nodpi/avatar_sheep.png",
      chick: "../app/src/main/res/drawable-nodpi/avatar_chick.png"
    };

    let activeReplyMessageId = null;
    let replyText = "";
    let expandedReplyIds = new Set();
    let editingMessageId = null;
    let viewerState = { open: false, messageId: null, index: 0 };
    let confirmState = null;

    const now = Date.now();
    let messages = [
      {
        id: "message-sheep-blossom",
        authorId: "sheep",
        authorName: "小羊",
        content: "今天看到一朵超美的樱花，第一时间就想分享给你。",
        imagePaths: [
          "mock://blossom-sky",
          "mock://sunset-gold",
          "mock://sunset-shore",
          "mock://desk",
          "mock://bread",
          "mock://library",
          "mock://sea",
          "mock://coffee",
          "mock://forest"
        ],
        createdAt: now - 10 * 60 * 1000,
        updatedAt: null,
        isRead: true,
        readAt: now - 10 * 60 * 1000,
        counterpartReadAt: null,
        replies: [
          {
            id: "reply-chick-blossom",
            messageId: "message-sheep-blossom",
            authorId: "chick",
            authorName: "小耶",
            content: "好想和你一起去看，光是照片就已经心动啦。",
            createdAt: now - 5 * 60 * 1000,
            isRead: false,
            readAt: null
          }
        ]
      },
      {
        id: "message-chick-sunset",
        authorId: "chick",
        authorName: "小耶",
        content: "一起去看了日落和海，好治愈呀。",
        imagePaths: ["mock://sunset-gold", "mock://sunset-shore"],
        createdAt: now - 16 * 60 * 60 * 1000,
        updatedAt: null,
        isRead: false,
        readAt: null,
        counterpartReadAt: now - 15 * 60 * 60 * 1000,
        replies: []
      },
      {
        id: "message-sheep-morning",
        authorId: "sheep",
        authorName: "小羊",
        content: "早安，新的一天也要元气满满哦。",
        imagePaths: [],
        createdAt: now - 32 * 60 * 60 * 1000,
        updatedAt: null,
        isRead: true,
        readAt: now - 32 * 60 * 60 * 1000,
        counterpartReadAt: now - 28 * 60 * 60 * 1000,
        replies: [
          { id: "reply-1", messageId: "message-sheep-morning", authorId: "sheep", authorName: "小羊", content: "记得喝温水，别空着肚子出门。", createdAt: now - 31 * 60 * 60 * 1000, isRead: true, readAt: now - 31 * 60 * 60 * 1000 },
          { id: "reply-2", messageId: "message-sheep-morning", authorId: "chick", authorName: "小耶", content: "收到收到，今天也会很想你。", createdAt: now - 30 * 60 * 60 * 1000, isRead: true, readAt: now - 29 * 60 * 60 * 1000 },
          { id: "reply-3", messageId: "message-sheep-morning", authorId: "sheep", authorName: "小羊", content: "那我等你下班，晚上一起吃小蛋糕。", createdAt: now - 29 * 60 * 60 * 1000, isRead: true, readAt: now - 29 * 60 * 60 * 1000 },
          { id: "reply-4", messageId: "message-sheep-morning", authorId: "chick", authorName: "小耶", content: "好呀，想吃奶油草莓味的！", createdAt: now - 28 * 60 * 60 * 1000, isRead: true, readAt: now - 28 * 60 * 60 * 1000 }
        ]
      },
      {
        id: "message-chick-text",
        authorId: "chick",
        authorName: "小耶",
        content: "回家路上给你带了热乎乎的小甜点，等会记得开门收惊喜。",
        imagePaths: [],
        createdAt: now - 46 * 60 * 60 * 1000,
        updatedAt: null,
        isRead: false,
        readAt: null,
        counterpartReadAt: now - 45 * 60 * 60 * 1000,
        replies: []
      }
    ];

    const feedEl = document.getElementById("feed");
    const emptyStateEl = document.getElementById("emptyState");
    const viewerEl = document.getElementById("viewer");
    const viewerStageEl = document.getElementById("viewerStage");
    const viewerCountEl = document.getElementById("viewerCount");
    const editOverlayEl = document.getElementById("editOverlay");
    const editInputEl = document.getElementById("editInput");
    const confirmOverlayEl = document.getElementById("confirmOverlay");
    const confirmTitleEl = document.getElementById("confirmTitle");
    const confirmTextEl = document.getElementById("confirmText");

    function formatTime(timestamp) {
      const date = new Date(timestamp);
      const diff = Date.now() - timestamp;
      const minute = 60 * 1000;
      const hour = 60 * minute;
      if (diff < minute) return "刚刚";
      if (diff < hour) return `${Math.floor(diff / minute)} 分钟前`;
      const nowDate = new Date();
      if (date.toDateString() === nowDate.toDateString()) {
        return date.toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit", hour12: false });
      }
      const yesterday = new Date(nowDate);
      yesterday.setDate(nowDate.getDate() - 1);
      if (date.toDateString() === yesterday.toDateString()) {
        return `昨天 ${date.toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit", hour12: false })}`;
      }
      return `${date.getMonth() + 1}月${date.getDate()}日 ${date.toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit", hour12: false })}`;
    }

    function visibleReplies(message) {
      const expanded = expandedReplyIds.has(message.id);
      const visible = expanded || message.replies.length <= 3
        ? message.replies
        : message.replies.slice(0, 3);
      return visible.map(reply => ({
        reply,
        index: message.replies.findIndex(item => item.id === reply.id)
      }));
    }

    function replyTargetName(message, replyIndex) {
      const reply = message.replies[replyIndex];
      if (!reply) return null;
      const previousDifferent = message.replies
        .slice(0, replyIndex)
        .reverse()
        .find(item => item.authorId !== reply.authorId);
      if (previousDifferent) return previousDifferent.authorName;
      return message.authorId !== reply.authorId ? message.authorName : null;
    }

    function imageCols(count) {
      if (count === 1) return 1;
      if (count === 2) return 2;
      if (count === 3) return 3;
      if (count === 4) return 2;
      return 3;
    }

    function mockClass(path) {
      if (path === "mock://blossom-sky") return ["mock-blossom", "樱花"];
      if (path === "mock://sunset-gold") return ["mock-sunset-gold", "日落"];
      if (path === "mock://sunset-shore") return ["mock-sunset-shore", "海边"];
      return ["mock-note", "照片"];
    }

    function renderMedia(path, single = false) {
      const cls = single ? "media single" : "media";
      if (path.startsWith("mock://")) {
        const [theme, label] = mockClass(path);
        return `<div class="${cls}"><div class="mock-photo ${theme}" data-label="${label}"></div></div>`;
      }
      return `<div class="${cls}"><img src="${path}" alt="留言图片"></div>`;
    }

    function renderFeed() {
      if (!messages.length) {
        emptyStateEl.classList.remove("hidden");
        feedEl.innerHTML = "";
        return;
      }
      emptyStateEl.classList.add("hidden");
      feedEl.innerHTML = messages.map(message => {
        const replies = visibleReplies(message);
        const cols = imageCols(message.imagePaths.length);
        const metaBits = [
          formatTime(message.createdAt),
          message.updatedAt ? "已编辑" : ""
        ].filter(Boolean).join(" · ");
        return `
          <article class="message-card" data-message-id="${message.id}">
            <div class="message-head">
              <div class="avatar"><img src="${avatars[message.authorId]}" alt="${message.authorName}头像"></div>
              <div class="author">
                <div class="author-name">${message.authorName}</div>
                <div class="author-time">${metaBits}</div>
              </div>
              <div class="more-wrap">
                <button class="text-btn more-btn" type="button" data-more="${message.id}" aria-label="更多操作">•••</button>
                <div class="more-menu" id="menu-${message.id}">
                  ${message.authorId === currentUserId ? `
                    <button type="button" data-edit="${message.id}">编辑留言</button>
                    <button class="danger" type="button" data-delete-message="${message.id}">删除留言</button>
                  ` : `
                    <button type="button" data-reply="${message.id}">回复留言</button>
                  `}
                </div>
              </div>
            </div>

            ${message.content ? `<div class="message-content">${escapeHtml(message.content)}</div>` : ""}

            ${message.imagePaths.length ? `
              <div class="message-images cols-${cols}">
                ${message.imagePaths.map((path, index) => `<div data-open-viewer="${message.id}" data-image-index="${index}">${renderMedia(path, message.imagePaths.length === 1)}</div>`).join("")}
              </div>` : ""}

            <div class="message-actions">
              <button class="heart" type="button" aria-label="赞">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20.3L4.7 13C2.4 10.7 2.4 6.9 4.7 4.7C7 2.4 10.8 2.4 13.1 4.7L12 5.8L10.9 4.7C8.6 2.4 4.8 2.4 2.5 4.7C.2 7 .2 10.8 2.5 13.1L12 22.6L21.5 13.1C23.8 10.8 23.8 7 21.5 4.7C19.2 2.4 15.4 2.4 13.1 4.7"/></svg>
                <span>赞</span>
              </button>
              <button type="button" data-reply="${message.id}" aria-label="评论">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5C21 16.2 16.7 20 11.5 20C10 20 8.6 19.7 7.3 19.1L3 20L4 15.9C3.4 14.6 3 13.1 3 11.5C3 6.8 7.3 3 12.5 3C17.7 3 22 6.8 22 11.5Z"/></svg>
                <span>${message.replies.length ? `评论 ${message.replies.length}` : "评论"}</span>
              </button>
            </div>

            ${replies.length ? `
              <div class="reply-list">
                ${replies.map(({ reply, index }) => `
                  <div class="reply-item">
                    <div class="reply-meta">
                      <span class="reply-name">${reply.authorName}</span>
                      ${replyTargetName(message, index) ? `<span class="reply-target">回复 ${replyTargetName(message, index)}</span>` : ``}
                      <span class="reply-time">${formatTime(reply.createdAt)}</span>
                      ${reply.authorId === currentUserId ? `<button class="delete" type="button" data-delete-reply="${reply.id}">删除</button>` : ``}
                    </div>
                    <div class="reply-content">${escapeHtml(reply.content)}</div>
                  </div>
                `).join("")}
                ${message.replies.length > 3 ? `<button class="reply-toggle" type="button" data-toggle-replies="${message.id}">${expandedReplyIds.has(message.id) ? "收起评论" : `查看全部 ${message.replies.length} 条评论`}</button>` : ""}
              </div>` : ""}

            ${activeReplyMessageId === message.id ? `
              <div class="reply-box">
                <textarea data-reply-input="${message.id}" maxlength="300" placeholder="回复…">${escapeHtml(replyText)}</textarea>
                <div class="reply-actions">
                  <button class="text-btn" type="button" data-cancel-reply="${message.id}">取消</button>
                  <button class="reply-send ${replyText.trim() ? "active" : ""}" type="button" data-send-reply="${message.id}" aria-label="发送回复">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M3 20L21 12L3 4L3 10L15 12L3 14L3 20Z"/></svg>
                  </button>
                </div>
              </div>` : ""}
          </article>
        `;
      }).join("");
    }

    function render() {
      renderFeed();
      updateViewer();
      updateEditSheet();
    }

    function markMessageRead(messageId) {
      const message = messages.find(item => item.id === messageId);
      if (!message) return;
      if (message.authorId !== currentUserId) {
        message.isRead = true;
        message.readAt = Date.now();
      }
      message.replies.forEach(reply => {
        if (reply.authorId !== currentUserId) {
          reply.isRead = true;
          reply.readAt = Date.now();
        }
      });
      render();
    }

    function openViewer(messageId, index) {
      viewerState = { open: true, messageId, index };
      markMessageRead(messageId);
      updateViewer();
    }

    function updateViewer() {
      if (!viewerState.open) {
        viewerEl.classList.remove("show");
        viewerStageEl.innerHTML = "";
        return;
      }
      const message = messages.find(item => item.id === viewerState.messageId);
      if (!message || !message.imagePaths.length) {
        viewerState.open = false;
        viewerEl.classList.remove("show");
        return;
      }
      const total = message.imagePaths.length;
      viewerState.index = Math.max(0, Math.min(viewerState.index, total - 1));
      viewerCountEl.textContent = `${viewerState.index + 1} / ${total}`;
      viewerStageEl.innerHTML = `
        ${total > 1 ? `<button class="viewer-nav prev" type="button" ${viewerState.index === 0 ? "disabled" : ""}>‹</button>` : ""}
        ${renderMedia(message.imagePaths[viewerState.index], true)}
        ${total > 1 ? `<button class="viewer-nav next" type="button" ${viewerState.index === total - 1 ? "disabled" : ""}>›</button>` : ""}
      `;
      viewerEl.classList.add("show");
    }

    function updateEditSheet() {
      if (!editingMessageId) {
        editOverlayEl.classList.remove("show");
        editInputEl.value = "";
        return;
      }
      const message = messages.find(item => item.id === editingMessageId);
      if (!message) return;
      editInputEl.value = message.content;
      editOverlayEl.classList.add("show");
    }

    function openConfirm(title, text, onConfirm) {
      confirmState = onConfirm;
      confirmTitleEl.textContent = title;
      confirmTextEl.textContent = text;
      confirmOverlayEl.classList.add("show");
    }

    function closeConfirm() {
      confirmState = null;
      confirmOverlayEl.classList.remove("show");
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    document.querySelector(".icon-circle.back").addEventListener("click", () => {
      window.location.href = "./homepage_preview.html";
    });

    document.getElementById("openEditorBtn").addEventListener("click", () => {
      window.location.href = "./message_wall_editor_preview.html";
    });

    document.getElementById("emptyWriteBtn").addEventListener("click", () => {
      window.location.href = "./message_wall_editor_preview.html";
    });

    feedEl.addEventListener("click", event => {
      const target = event.target.closest("[data-reply],[data-toggle-replies],[data-open-viewer],[data-delete-reply],[data-delete-message],[data-edit],[data-send-reply],[data-cancel-reply],[data-more]");
      if (!target) {
        const card = event.target.closest(".message-card");
        if (card) markMessageRead(card.dataset.messageId);
        return;
      }

      if (target.dataset.reply) {
        activeReplyMessageId = target.dataset.reply;
        replyText = "";
        markMessageRead(activeReplyMessageId);
        render();
        return;
      }

      if (target.dataset.toggleReplies) {
        const id = target.dataset.toggleReplies;
        if (expandedReplyIds.has(id)) {
          expandedReplyIds.delete(id);
        } else {
          expandedReplyIds.add(id);
        }
        markMessageRead(id);
        render();
        return;
      }

      if (target.dataset.openViewer) {
        openViewer(target.dataset.openViewer, Number(target.dataset.imageIndex || 0));
        return;
      }

      if (target.dataset.deleteReply) {
        const replyId = target.dataset.deleteReply;
        openConfirm("删除这条评论？", "删除后无法恢复。", () => {
          messages.forEach(message => {
            message.replies = message.replies.filter(reply => !(reply.id === replyId && reply.authorId === currentUserId));
          });
          closeConfirm();
          render();
        });
        return;
      }

      if (target.dataset.deleteMessage) {
        const messageId = target.dataset.deleteMessage;
        openConfirm("删除这条留言？", "删除后，这条留言和它的回复都会一起移除。", () => {
          messages = messages.filter(message => !(message.id === messageId && message.authorId === currentUserId));
          closeConfirm();
          render();
        });
        return;
      }

      if (target.dataset.edit) {
        editingMessageId = target.dataset.edit;
        updateEditSheet();
        return;
      }

      if (target.dataset.sendReply) {
        const id = target.dataset.sendReply;
        if (!replyText.trim()) {
          alert("回复内容不能为空");
          return;
        }
        const message = messages.find(item => item.id === id);
        if (!message) return;
        message.replies.push({
          id: `reply-${crypto.randomUUID()}`,
          messageId: id,
          authorId: currentUserId,
          authorName: currentUserName,
          content: replyText.trim(),
          createdAt: Date.now(),
          isRead: true,
          readAt: Date.now()
        });
        activeReplyMessageId = null;
        replyText = "";
        render();
        return;
      }

      if (target.dataset.cancelReply) {
        activeReplyMessageId = null;
        replyText = "";
        render();
        return;
      }

      if (target.dataset.more) {
        document.querySelectorAll(".more-menu.show").forEach(menu => {
          if (menu.id !== `menu-${target.dataset.more}`) {
            menu.classList.remove("show");
          }
        });
        document.getElementById(`menu-${target.dataset.more}`)?.classList.toggle("show");
      }
    });

    feedEl.addEventListener("input", event => {
      const target = event.target;
      if (target.matches("[data-reply-input]")) {
        replyText = target.value.slice(0, 300);
        render();
      }
    });

    document.getElementById("viewerClose").addEventListener("click", () => {
      viewerState.open = false;
      updateViewer();
    });

    viewerStageEl.addEventListener("click", event => {
      if (event.target.closest(".viewer-nav.prev")) {
        viewerState.index -= 1;
        updateViewer();
      }
      if (event.target.closest(".viewer-nav.next")) {
        viewerState.index += 1;
        updateViewer();
      }
    });

    document.getElementById("editCancel").addEventListener("click", () => {
      editingMessageId = null;
      updateEditSheet();
    });

    document.getElementById("editSave").addEventListener("click", () => {
      const message = messages.find(item => item.id === editingMessageId);
      if (!message) return;
      const text = editInputEl.value.trim();
      if (!text) {
        alert("留言内容不能为空");
        return;
      }
      message.content = text.slice(0, 500);
      message.updatedAt = Date.now();
      editingMessageId = null;
      render();
    });

    document.getElementById("confirmCancel").addEventListener("click", closeConfirm);
    document.getElementById("confirmOk").addEventListener("click", () => {
      if (confirmState) confirmState();
    });

    document.addEventListener("click", event => {
      if (!event.target.closest(".more-wrap")) {
        document.querySelectorAll(".more-menu.show").forEach(menu => menu.classList.remove("show"));
      }
    });

    render();
  </script>
</body>
</html>
