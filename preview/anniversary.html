<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>纪念日预览</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@500;600;700&family=Playfair+Display:wght@500;600;700&display=swap');

    :root{
      --bg:#fbf8f9;
      --bg-top:#fdf3f6;
      --surface:rgba(255,255,255,.92);
      --line:#f2e7eb;
      --ink:#202128;
      --muted:#8b8792;
      --pink:#ff6f95;
      --pink-strong:#ff5a8b;
      --pink-soft:#fff0f4;
      --blue:#f3f8fd;
      --gold:#fff6e4;
      --mint:#eff9f3;
      --gray:#f5f4f6;
      --shadow:0 10px 28px rgba(89,61,72,.07);
      --font-body:"Inter","Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;
      --font-heading:"Playfair Display","Noto Serif SC","PingFang SC","Microsoft YaHei",serif;
      --font-number:var(--font-body);
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      background:#f6f2f4;
      color:var(--ink);
      font-family:var(--font-body);
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
      font-kerning:normal;
    }
    body{min-height:100vh;padding:24px 12px;display:flex;justify-content:center}

    .phone{
      width:min(100%,430px);
      min-height:calc(100vh - 48px);
      background:linear-gradient(180deg,var(--bg-top),var(--bg));
      border-radius:38px;
      border:1px solid rgba(255,255,255,.84);
      box-shadow:0 20px 56px rgba(49,34,41,.12);
      overflow:hidden;
      position:relative;
    }

    .screen{
      min-height:100%;
      padding:calc(14px + env(safe-area-inset-top)) 16px calc(112px + env(safe-area-inset-bottom));
      overflow:auto;
    }

    .topbar{
      display:grid;
      grid-template-columns:44px 1fr 44px;
      align-items:center;
      margin-bottom:14px;
    }

    .topbar.no-back{
      grid-template-columns:1fr 44px;
    }

    .title{
      margin:0;
      text-align:center;
      font-size:21px;
      font-family:var(--font-heading);
      font-weight:700;
      letter-spacing:0;
    }

    .topbar.no-back .title{
      text-align:left;
    }

    .circle-btn{
      width:40px;
      height:40px;
      border:none;
      border-radius:50%;
      background:rgba(255,255,255,.82);
      border:1px solid rgba(242,231,235,.96);
      box-shadow:0 8px 18px rgba(116,61,78,.06);
      display:grid;
      place-items:center;
      color:var(--ink);
      cursor:pointer;
    }

    .circle-btn svg{width:21px;height:21px}
    .circle-btn.add{color:var(--pink)}

    .hero,
    .card,
    .empty-card{
      background:var(--surface);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
    }

    .hero{
      display:grid;
      grid-template-columns:minmax(0,1fr) 156px;
      align-items:center;
      gap:4px;
      border-radius:28px;
      padding:12px 8px 12px 18px;
      margin-bottom:14px;
    }

    .hero-copy{min-width:0}

    .hero-ill{
      grid-column:2;
      grid-row:1 / span 3;
      width:156px;
      height:122px;
      border-radius:0;
      overflow:visible;
      background:transparent;
      display:flex;
      align-items:center;
      justify-content:center;
      margin:0 -8px 0 auto;
    }

    .hero-ill img{
      width:100%;
      height:100%;
      object-fit:contain;
    }

    .hero-label{
      grid-column:1;
      margin:0;
      color:var(--muted);
      font-size:13px;
      font-weight:700;
      letter-spacing:.01em;
    }

    .hero-days{
      grid-column:1;
      display:flex;
      align-items:flex-end;
      justify-content:flex-start;
      gap:4px;
      margin:8px 0 4px;
    }

    .hero-days strong{
      font-size:42px;
      line-height:1;
      font-family:var(--font-number);
      font-weight:900;
      color:var(--ink);
      letter-spacing:-.025em;
      font-variant-numeric:tabular-nums;
    }

    @media (max-width:360px){
      .hero{
        grid-template-columns:minmax(0,1fr) 140px;
        padding-right:6px;
      }

      .hero-ill{
        width:140px;
        height:114px;
        margin-right:-8px;
      }

      .hero-days strong{
        font-size:38px;
      }
    }

    .hero-days span{
      padding-bottom:4px;
      font-size:18px;
      font-weight:700;
      color:var(--muted);
    }

    .hero-sub{
      grid-column:1;
      margin:0;
      font-size:14px;
      color:var(--muted);
      line-height:1.6;
      font-family:var(--font-number);
      font-variant-numeric:tabular-nums;
    }

    .legend{
      display:none;
      gap:8px;
      margin:0 0 16px;
      padding:14px 16px;
      border-radius:24px;
      border:1px solid rgba(246,220,229,.92);
      background:rgba(255,255,255,.72);
    }

    .legend-item{
      display:flex;
      align-items:center;
      gap:10px;
      color:var(--muted);
      font-size:13px;
      font-weight:700;
    }

    .legend-dot{
      width:12px;
      height:12px;
      border-radius:50%;
      flex:none;
    }

    .list{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .card{
      border-radius:24px;
      padding:14px 16px;
    }

    .card-head{
      display:flex;
      align-items:flex-start;
      gap:12px;
    }

    .icon-box{
      width:42px;
      height:42px;
      border-radius:50%;
      display:grid;
      place-items:center;
      font-size:20px;
      flex:none;
      border:none;
    }

    .icon-box.today,
    .icon-box.upcoming{background:rgba(255,111,149,.14)}
    .icon-box.past{background:rgba(77,182,172,.14)}
    .icon-box.expired{background:rgba(176,190,197,.14)}

    .card-main{min-width:0;flex:1}
    .card-title-row{
      display:flex;
      align-items:flex-start;
      gap:8px;
    }

    .card-title{
      margin:0;
      font-size:17px;
      font-family:var(--font-body);
      font-weight:800;
      line-height:1.35;
      flex:1;
      letter-spacing:-.008em;
    }

    .card-date{
      color:var(--muted);
      font-size:13px;
      font-weight:700;
      margin:4px 0 0;
      font-family:var(--font-number);
      font-variant-numeric:tabular-nums;
    }

    .meta-row,
    .chip-row{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
      font-size:12px;
      margin-top:10px;
      font-family:var(--font-number);
      font-variant-numeric:tabular-nums;
    }

    .status-badge,
    .meta-copy,
    .pill{
      display:inline-flex;
      align-items:center;
      min-height:28px;
    }

    .status-badge{
      border-radius:999px;
      padding:0 10px;
      font-weight:700;
    }

    .status-badge.today{background:var(--pink-soft);color:var(--pink-strong)}
    .status-badge.upcoming{background:var(--gold);color:#a87711}
    .status-badge.past{background:var(--mint);color:#40856e}
    .status-badge.expired{background:var(--gray);color:#767682}

    .meta-copy{
      color:var(--muted);
      font-weight:640;
    }

    .pill{
      border-radius:999px;
      padding:4px 10px;
      font-weight:700;
    }

    .pill.today{background:rgba(255,111,149,.1);color:var(--pink)}
    .pill.upcoming{background:rgba(255,111,149,.12);color:var(--pink)}
    .pill.past{background:rgba(77,182,172,.1);color:#4db6ac}
    .pill.expired{background:rgba(139,135,146,.1);color:var(--muted)}
    .pill.repeat{
      width:max-content;
      margin-top:8px;
      background:#f9f4f6;
      color:var(--muted);
      font-size:13px;
      font-weight:700;
    }

    .meta-sep{
      width:3px;
      height:3px;
      border-radius:50%;
      background:#d4ced5;
      flex:none;
    }

    .text-icon{
      border:none;
      background:none;
      color:var(--muted);
      font-size:18px;
      line-height:1;
      cursor:pointer;
      padding:2px 0 0;
      flex:none;
    }

    .menu-wrap{position:relative;margin-left:auto}
    .menu{
      position:absolute;
      right:0;
      top:28px;
      width:118px;
      border-radius:16px;
      border:1px solid rgba(242,231,235,.94);
      background:#fff;
      box-shadow:0 14px 28px rgba(52,30,39,.1);
      padding:8px;
      display:none;
      z-index:10;
    }

    .menu.show{display:block}
    .menu button{
      width:100%;
      border:none;
      background:none;
      text-align:left;
      padding:10px 12px;
      border-radius:12px;
      cursor:pointer;
      color:var(--ink);
      font:600 14px/1.2 inherit;
    }

    .menu button:hover{background:#fff4f8}
    .menu button.danger{color:var(--pink)}

    .card-side{
      display:flex;
      flex-direction:column;
      align-items:flex-end;
      gap:6px;
      flex:none;
    }

    .card-actions{
      display:flex;
      gap:2px;
      align-items:center;
      justify-content:flex-end;
    }

    .mini-action{
      width:28px;
      height:28px;
      border:none;
      border-radius:50%;
      display:grid;
      place-items:center;
      background:rgba(255,255,255,.86);
      color:var(--muted);
      cursor:pointer;
    }

    .mini-action svg{
      width:17px;
      height:17px;
    }

    .mini-action.danger{color:var(--pink)}

    .empty-card{
      border-radius:24px;
      padding:22px 18px;
      text-align:center;
    }

    .empty-card .hero-ill{
      width:100%;
      height:132px;
      margin:0 auto 12px;
    }

    .empty-card h3{
      margin:10px 0 6px;
      font-size:22px;
      font-family:var(--font-heading);
      font-weight:700;
      letter-spacing:-.01em;
    }
    .empty-card p{margin:0 0 16px;color:var(--muted);line-height:1.7}

    .overlay{
      position:fixed;
      inset:0;
      background:rgba(21,18,24,.62);
      display:none;
      align-items:flex-end;
      justify-content:center;
      padding:20px 10px;
      z-index:99;
    }

    .overlay.show{display:flex}

    .sheet{
      width:min(100%,430px);
      border-radius:30px 30px 0 0;
      background:#fff;
      box-shadow:0 30px 72px rgba(33,20,28,.3);
      padding:18px 18px calc(20px + env(safe-area-inset-bottom));
      max-height:88vh;
      overflow:auto;
    }

    .sheet h3{
      margin:0 0 16px;
      font-size:22px;
      font-family:var(--font-heading);
      font-weight:700;
      letter-spacing:-.01em;
    }

    .field{margin-bottom:14px}
    .field-label{margin-bottom:8px;font-size:14px;font-weight:800}

    input[type="text"],
    input[type="date"]{
      width:100%;
      border:none;
      outline:none;
      border-radius:22px;
      background:#fffafc;
      border:1px solid rgba(245,220,229,.95);
      padding:14px 16px;
      font:600 15px/1.6 var(--font-body);
      color:var(--ink);
      font-variant-numeric:tabular-nums;
    }

    .switch-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:4px 0 6px;
    }

    .switch-note{
      color:var(--muted);
      font-size:12px;
      line-height:1.6;
      margin-top:4px;
    }

    .toggle{
      width:54px;
      height:32px;
      border:none;
      border-radius:999px;
      background:#f1d7df;
      position:relative;
      cursor:pointer;
      transition:.2s;
    }

    .toggle::after{
      content:"";
      position:absolute;
      top:4px;
      left:4px;
      width:24px;
      height:24px;
      border-radius:50%;
      background:#fff;
      box-shadow:0 4px 10px rgba(32,20,26,.14);
      transition:.2s;
    }

    .toggle.active{
      background:linear-gradient(135deg,#ff89aa,#ff5c89);
    }

    .toggle.active::after{
      transform:translateX(22px);
    }

    .reminders{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .emoji-picker{
      display:grid;
      grid-template-columns:repeat(6,1fr);
      gap:8px;
    }

    .emoji-option{
      height:44px;
      border-radius:999px;
      border:1px solid rgba(242,231,235,.92);
      background:#fffbfd;
      display:grid;
      place-items:center;
      font-size:21px;
      cursor:pointer;
      transition:background .18s ease,border-color .18s ease,transform .18s ease;
    }

    .emoji-option.active{
      background:#fff0f4;
      border-color:rgba(255,111,149,.36);
      transform:translateY(-1px);
    }

    .reminder{
      border:none;
      border-radius:999px;
      padding:11px 14px;
      background:#fff;
      border:1px solid rgba(245,220,229,.92);
      color:var(--muted);
      font-weight:700;
      cursor:pointer;
    }

    .reminder.active{
      background:linear-gradient(135deg,#ff89aa,#ff5c89);
      border-color:transparent;
      color:#fff;
      box-shadow:0 12px 22px rgba(255,111,149,.22);
    }

    .primary-btn,
    .secondary-btn{
      border:none;
      border-radius:999px;
      cursor:pointer;
      font-weight:800;
      font-family:inherit;
      padding:14px 24px;
      font-size:16px;
    }

    .primary-btn{
      background:linear-gradient(135deg,#ff89aa,#ff5c89);
      color:#fff;
      box-shadow:0 14px 24px rgba(255,111,149,.24);
    }

    .secondary-btn{
      background:#fff;
      border:1px solid rgba(245,220,229,.95);
      color:var(--ink);
    }

    .sheet-actions{
      display:flex;
      justify-content:flex-end;
      gap:12px;
      margin-top:18px;
    }

    .confirm{
      width:min(100%,380px);
      border-radius:28px;
      background:#fff;
      box-shadow:0 30px 80px rgba(33,20,28,.3);
      padding:22px 20px;
      margin:auto;
    }

    .confirm h3{margin:0 0 10px;font-size:22px}
    .confirm p{margin:0;color:var(--muted);line-height:1.7}
    .confirm .sheet-actions{margin-top:18px}

    .main-tab-nav{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      display:grid;
      grid-template-columns:repeat(4,1fr);
      padding:8px 10px calc(10px + env(safe-area-inset-bottom));
      border-radius:26px 26px 0 0;
      border-top:1px solid var(--line);
      background:rgba(255,255,255,.96);
      box-shadow:0 -4px 14px rgba(58,39,46,.04);
      z-index:20;
    }

    .main-tab-item{
      border:0;
      background:transparent;
      color:var(--muted);
      font:700 12px/16px var(--font-body);
      padding:6px 4px;
      cursor:pointer;
    }

    .main-tab-item.active{
      color:var(--pink);
      font-weight:800;
    }

    .main-tab-item img{
      display:block;
      width:24px;
      height:24px;
      margin:0 auto 4px;
      object-fit:contain;
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="screen" id="screen"></div>
    <nav class="main-tab-nav">
      <button class="main-tab-item" type="button" data-main-tab="./homepage_preview.html"><img src="../app/src/main/res/drawable-nodpi/ic_home_nav_active.png" alt="">首页</button>
      <button class="main-tab-item" type="button" data-main-tab="./message_wall_preview.html"><img src="../app/src/main/res/drawable-nodpi/ic_message_wall_card.png" alt="">留言墙</button>
      <button class="main-tab-item" type="button" data-main-tab="./wish_list.html"><img src="../app/src/main/res/drawable-nodpi/ic_wishlist_card.png" alt="">愿望清单</button>
      <button class="main-tab-item active" type="button" data-main-tab="./anniversary.html"><img src="../app/src/main/res/drawable-nodpi/ic_calendar_nav.png" alt="">纪念日</button>
    </nav>
  </div>

  <div class="overlay" id="editorOverlay">
    <div class="sheet">
      <h3 id="editorTitle"></h3>
      <div class="field">
        <div class="field-label">纪念日名称 *</div>
        <input id="nameInput" type="text" maxlength="50" placeholder="请输入纪念日名称" />
      </div>
      <div class="field">
        <div class="field-label">图标</div>
        <div class="emoji-picker" id="iconPicker"></div>
      </div>
      <div class="field">
        <div class="field-label">日期 *</div>
        <input id="dateInput" type="date" />
      </div>
      <div class="field">
        <div class="switch-row">
          <div>
            <div class="field-label" style="margin:0">每年重复</div>
            <div class="switch-note">生日、相识纪念日这类更适合打开重复。</div>
          </div>
          <button class="toggle" id="repeatToggle" type="button" aria-label="每年重复"></button>
        </div>
      </div>
      <div class="field">
        <div class="field-label">提醒时间</div>
        <div class="reminders" id="reminderRow"></div>
      </div>
      <div class="sheet-actions">
        <button class="secondary-btn" id="editorCancel" type="button">取消</button>
        <button class="primary-btn" id="editorSave" type="button">保存</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="confirmOverlay">
    <div class="confirm">
      <h3 id="confirmTitle"></h3>
      <p id="confirmText"></p>
      <div class="sheet-actions">
        <button class="secondary-btn" id="confirmCancel" type="button">取消</button>
        <button class="primary-btn" id="confirmOk" type="button">删除</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "secretbase-preview-anniversaries-v1";
    const screenEl = document.getElementById("screen");
    const overlayEl = document.getElementById("editorOverlay");
    const confirmOverlayEl = document.getElementById("confirmOverlay");
    const heroImage = "../app/src/main/res/drawable-nodpi/home_couple_hero.webp?v=20260710-new-hero";
    const relationshipStart = "2026-05-06";
    const today = toDateString(Date.now());

    const reminderOptions = [
      { value: "NONE", label: "不提醒" },
      { value: "SAME_DAY", label: "当天提醒" },
      { value: "ONE_DAY_BEFORE", label: "提前1天" },
      { value: "THREE_DAYS_BEFORE", label: "提前3天" }
    ];

    const iconMap = {
      "在一起的日子": "💗",
      "第一次约会": "🌸",
      "第一次旅行": "✈️",
      "第一次见家长": "🏠",
      "生日 - 小羊": "🎂",
      "生日 - 小耶": "🎁"
    };

    const iconOptions = ["💗","🌸","🎂","🎁","✈️","🌊","⭐","🍀","🏠","📷","🍰","🎬","🌙","☀️","💌","🦋","🐑","🐥"];

    const appState = {
      editorOpen: false,
      editingId: null,
      name: "",
      date: today,
      iconEmoji: "💗",
      repeatYearly: true,
      reminderType: "NONE",
      menuId: null
    };

    let anniversaries = loadItems();
    let confirmHandler = null;

    function seedItems() {
      return [
        { id: "anniversary-love", title: "在一起的日子", date: "2026-05-06", repeatYearly: false, reminderType: "NONE", createdAt: "2026-05-06", iconEmoji: "💗" },
        { id: "anniversary-first-date", title: "第一次约会", date: "2026-06-15", repeatYearly: true, reminderType: "SAME_DAY", createdAt: "2026-05-20", iconEmoji: "🌸" },
        { id: "anniversary-first-trip", title: "第一次旅行", date: "2026-10-01", repeatYearly: true, reminderType: "ONE_DAY_BEFORE", createdAt: "2026-05-23", iconEmoji: "✈️" },
        { id: "anniversary-first-growth", title: "第一次见家长", date: "2026-10-20", repeatYearly: false, reminderType: "THREE_DAYS_BEFORE", createdAt: "2026-05-26", iconEmoji: "🏠" },
        { id: "anniversary-sheep-birthday", title: "生日 - 小羊", date: "2026-08-15", repeatYearly: true, reminderType: "ONE_DAY_BEFORE", createdAt: "2026-05-28", iconEmoji: "🎂" },
        { id: "anniversary-chick-birthday", title: "生日 - 小耶", date: "2026-11-02", repeatYearly: true, reminderType: "THREE_DAYS_BEFORE", createdAt: "2026-05-28", iconEmoji: "🎁" }
      ];
    }

    function loadItems() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) {
        const seed = seedItems();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(seed));
        return seed;
      }
      try {
        return JSON.parse(raw);
      } catch (error) {
        const seed = seedItems();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(seed));
        return seed;
      }
    }

    function persist() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(anniversaries));
    }

    function toDateString(timestamp) {
      const date = new Date(timestamp);
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${date.getFullYear()}-${month}-${day}`;
    }

    function formatDate(value) {
      return value.replaceAll("-", ".");
    }

    function dateDiffInDays(from, to) {
      const start = new Date(`${from}T00:00:00+08:00`).getTime();
      const end = new Date(`${to}T00:00:00+08:00`).getTime();
      return Math.round((end - start) / 86400000);
    }

    function relationshipDays() {
      return Math.max(1, dateDiffInDays(relationshipStart, today) + 1);
    }

    function normalizedDate(item) {
      if (!item.repeatYearly) return item.date;
      const [, month, day] = item.date.split("-");
      const thisYear = `${today.slice(0, 4)}-${month}-${day}`;
      return thisYear < today ? `${Number(today.slice(0, 4)) + 1}-${month}-${day}` : thisYear;
    }

    function itemStatus(item) {
      const effectiveDate = normalizedDate(item);
      const diff = dateDiffInDays(today, effectiveDate);
      if (diff === 0) {
        return { text: "就是今天", tone: "today", sortBucket: 0, distance: 0 };
      }
      if (diff > 0) {
        return { text: `还有 ${diff} 天`, tone: "upcoming", sortBucket: 1, distance: diff };
      }
      if (item.repeatYearly) {
        return { text: `已过去 ${Math.abs(diff)} 天`, tone: "past", sortBucket: 2, distance: Math.abs(diff) };
      }
      return { text: "已过期（不重复）", tone: "expired", sortBucket: 3, distance: 9999 };
    }

    function sortedItems() {
      return [...anniversaries]
        .map(item => ({ ...item, meta: itemStatus(item) }))
        .sort((a, b) => {
          if (a.meta.sortBucket !== b.meta.sortBucket) return a.meta.sortBucket - b.meta.sortBucket;
          return a.meta.distance - b.meta.distance;
        });
    }

    function defaultIconForTitle(title) {
      if (title.includes("生日")) return "🎂";
      if (title.includes("旅行")) return "✈️";
      if (title.includes("约会")) return "🌸";
      if (title.includes("见家长")) return "🏠";
      if (title.includes("照片") || title.includes("相册")) return "📷";
      if (title.includes("电影")) return "🎬";
      if (title.includes("海")) return "🌊";
      return iconMap[title] || "💗";
    }

    function legend() {
      return `
        <section class="legend">
          <div class="legend-item"><span class="legend-dot" style="background:#ff8ead"></span>就是今天</div>
          <div class="legend-item"><span class="legend-dot" style="background:#ffc45c"></span>还有 x 天</div>
          <div class="legend-item"><span class="legend-dot" style="background:#7bd0b2"></span>已经过去 x 天</div>
          <div class="legend-item"><span class="legend-dot" style="background:#c8c6cc"></span>已过期（不重复）</div>
        </section>
      `;
    }

    function renderCard(item) {
      const meta = item.meta;
      return `
        <article class="card">
          <div class="card-head">
            <div class="icon-box ${meta.tone}">${item.iconEmoji || defaultIconForTitle(item.title)}</div>
            <div class="card-main">
              <div class="card-title">${escapeHtml(item.title)}</div>
              <div class="card-date">${formatDate(item.date)}</div>
              <div class="pill repeat">${item.repeatYearly ? "每年重复" : "不重复"}</div>
            </div>
            <div class="card-side">
              <span class="pill ${meta.tone}">${meta.text}</span>
              <div class="card-actions">
                <button class="mini-action" type="button" data-action="edit" data-id="${item.id}" aria-label="编辑">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
                </button>
                <button class="mini-action danger" type="button" data-action="delete" data-id="${item.id}" aria-label="删除">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v5"/><path d="M14 11v5"/></svg>
                </button>
              </div>
            </div>
          </div>
        </article>
      `;
    }

    function render() {
      const items = sortedItems();
      screenEl.innerHTML = `
        <div class="topbar no-back">
          <h1 class="title">???</h1>
          <button class="circle-btn add" type="button" data-action="open-editor" aria-label="新增">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5V19"/><path d="M5 12H19"/></svg>
          </button>
        </div>

        <section class="hero">
          <div class="hero-ill"><img src="${heroImage}" alt="插画"></div>
          <p class="hero-label">我们在一起已经</p>
          <div class="hero-days"><strong>${relationshipDays()}</strong><span>天</span></div>
          <p class="hero-sub">从 ${formatDate(relationshipStart)} 开始</p>
        </section>

        ${legend()}

        ${items.length ? `<section class="list">${items.map(renderCard).join("")}</section>` : `
          <section class="empty-card">
            <div class="hero-ill"><img src="${heroImage}" alt="插画"></div>
            <h3>还没有纪念日</h3>
            <p>把值得记住的日子都放进来，以后就不会错过了。</p>
            <button class="primary-btn" type="button" data-action="open-editor">新增纪念日</button>
          </section>
        `}
      `;
    }

    function openEditor(item) {
      appState.editorOpen = true;
      appState.editingId = item ? item.id : null;
      appState.name = item ? item.title : "";
      appState.date = item ? item.date : today;
      appState.iconEmoji = item ? (item.iconEmoji || defaultIconForTitle(item.title)) : "💗";
      appState.repeatYearly = item ? item.repeatYearly : true;
      appState.reminderType = item ? item.reminderType : "NONE";
      document.getElementById("editorTitle").textContent = item ? "编辑纪念日" : "新增纪念日";
      document.getElementById("nameInput").value = appState.name;
      document.getElementById("dateInput").value = appState.date;
      renderIconPicker();
      renderReminderRow();
      syncToggle();
      overlayEl.classList.add("show");
    }

    function closeEditor() {
      appState.editorOpen = false;
      overlayEl.classList.remove("show");
    }

    function syncToggle() {
      document.getElementById("repeatToggle").classList.toggle("active", appState.repeatYearly);
    }

    function renderIconPicker() {
      document.getElementById("iconPicker").innerHTML = iconOptions.map(emoji => `
        <button class="emoji-option ${appState.iconEmoji === emoji ? "active" : ""}" type="button" data-action="pick-icon" data-value="${emoji}" aria-label="选择 ${emoji}">${emoji}</button>
      `).join("");
    }

    function renderReminderRow() {
      document.getElementById("reminderRow").innerHTML = reminderOptions.map(option => `
        <button class="reminder ${appState.reminderType === option.value ? "active" : ""}" type="button" data-action="pick-reminder" data-value="${option.value}">${option.label}</button>
      `).join("");
    }

    function saveEditor() {
      const title = document.getElementById("nameInput").value.trim();
      const date = document.getElementById("dateInput").value;
      if (!title) {
        alert("纪念日名称不能为空");
        return;
      }
      if (!date) {
        alert("请选择日期");
        return;
      }
      const payload = {
        id: appState.editingId || `anniversary-${crypto.randomUUID()}`,
        title,
        date,
        iconEmoji: appState.iconEmoji || defaultIconForTitle(title),
        repeatYearly: appState.repeatYearly,
        reminderType: appState.reminderType,
        createdAt: appState.editingId ? anniversaries.find(item => item.id === appState.editingId)?.createdAt || today : today
      };
      if (appState.editingId) {
        anniversaries = anniversaries.map(item => item.id === payload.id ? payload : item);
      } else {
        anniversaries.push(payload);
      }
      persist();
      closeEditor();
      render();
    }

    function openConfirm(title, text, handler) {
      confirmHandler = handler;
      document.getElementById("confirmTitle").textContent = title;
      document.getElementById("confirmText").textContent = text;
      confirmOverlayEl.classList.add("show");
    }

    function closeConfirm() {
      confirmHandler = null;
      confirmOverlayEl.classList.remove("show");
    }

    function escapeHtml(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    screenEl.addEventListener("click", event => {
      const actionEl = event.target.closest("[data-action]");
      if (!actionEl) {
        if (!event.target.closest(".menu-wrap")) {
          appState.menuId = null;
          render();
        }
        return;
      }

      const { action, id, value } = actionEl.dataset;
      if (action === "back-home") {
        window.location.href = "./homepage_preview.html";
        return;
        alert("这里是可独立浏览的预览页，Android 端已经预留从首页进入纪念日页面的跳转。");
        return;
      }
      if (action === "open-editor") {
        openEditor(null);
        return;
      }
      if (action === "toggle-menu") {
        appState.menuId = appState.menuId === id ? null : id;
        render();
        return;
      }
      if (action === "edit") {
        const item = anniversaries.find(entry => entry.id === id);
        if (item) openEditor(item);
        return;
      }
      if (action === "delete") {
        openConfirm("删除这个纪念日？", "删除后不会再出现在列表中，后续可以重新新增。", () => {
          anniversaries = anniversaries.filter(item => item.id !== id);
          persist();
          closeConfirm();
          render();
        });
        return;
      }
    });

    document.getElementById("editorCancel").addEventListener("click", closeEditor);
    document.getElementById("editorSave").addEventListener("click", saveEditor);
    document.getElementById("confirmCancel").addEventListener("click", closeConfirm);
    document.getElementById("confirmOk").addEventListener("click", () => {
      if (confirmHandler) confirmHandler();
    });

    document.getElementById("repeatToggle").addEventListener("click", () => {
      appState.repeatYearly = !appState.repeatYearly;
      syncToggle();
    });

    document.getElementById("iconPicker").addEventListener("click", event => {
      const button = event.target.closest("[data-action='pick-icon']");
      if (!button) return;
      appState.iconEmoji = button.dataset.value;
      renderIconPicker();
    });

    document.getElementById("reminderRow").addEventListener("click", event => {
      const button = event.target.closest("[data-action='pick-reminder']");
      if (!button) return;
      appState.reminderType = button.dataset.value;
      renderReminderRow();
    });

    document.addEventListener("click", event => {
      if (!event.target.closest(".menu-wrap")) {
        const hasMenu = document.querySelector(".menu.show");
        if (hasMenu) {
          appState.menuId = null;
          render();
        }
      }
    });

    const mainTabPageMap = {
      "./homepage_preview.html": "home",
      "./message_wall_preview.html": "messageWall",
      "./wish_list.html": "wishList",
      "./anniversary.html": "anniversary"
    };

    function openMainTab(route) {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: "secretbase-preview:navigate",
          page: mainTabPageMap[route] || null,
          route
        }, "*");
        return;
      }
      window.location.href = route;
    }

    document.querySelectorAll("[data-main-tab]").forEach(node => {
      node.addEventListener("click", event => {
        event.preventDefault();
        openMainTab(node.dataset.mainTab);
      });
    });

    render();
  </script>
</body>
</html>
