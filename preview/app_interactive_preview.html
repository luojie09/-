<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>我们的秘密基地</title>
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:#f5f1f3;color:#202128;font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei",system-ui,sans-serif}
    body{display:flex;justify-content:center;padding:10px}
    .shell{width:min(100%,430px);height:calc(100dvh - 20px);display:flex;flex-direction:column;gap:8px}
    .tabs{display:flex;gap:7px;overflow:auto;padding:2px;scrollbar-width:none}
    .tabs::-webkit-scrollbar{display:none}
    .tab{flex:0 0 auto;border:1px solid #f1e4e9;background:rgba(255,255,255,.82);color:#928b91;border-radius:999px;padding:7px 11px;font:700 12px/1.2 inherit;white-space:nowrap}
    .tab.active{border-color:#ff8aa8;background:#ff8aa8;color:#fff}
    .viewer{position:relative;flex:1;min-height:0;overflow:hidden;border:1px solid rgba(255,255,255,.9);border-radius:26px;background:#fff7f8;box-shadow:0 14px 38px rgba(52,33,41,.1)}
    iframe{display:block;width:100%;height:100%;border:0;background:#fff7f8}
    .transition{position:absolute;inset:0;pointer-events:none;background:#fff7f8;opacity:0;transition:opacity .16s ease}
    .transition.show{opacity:.48}
    @media (max-width:480px){body{padding:0}.shell{width:100%;height:100dvh;gap:0}.tabs{display:none}.viewer{border:0;border-radius:0;box-shadow:none}}
    @media (prefers-reduced-motion:reduce){.transition{transition:none}}
  </style>
</head>
<body>
  <main class="shell">
    <nav class="tabs" id="tabs" aria-label="预览页面"></nav>
    <section class="viewer">
      <iframe id="frame" title="我们的秘密基地交互预览"></iframe>
      <div class="transition" id="transition"></div>
    </section>
  </main>
  <script>
    (() => {
      const routes = [
        { id: "home", label: "首页", file: "homepage_preview.html" },
        { id: "messageWall", label: "留言墙", file: "message_wall_preview.html" },
        { id: "messageEditor", label: "写留言", file: "message_wall_editor_preview.html" },
        { id: "wishList", label: "愿望清单", file: "wish_list.html" },
        { id: "recentActivity", label: "最近动态", file: "recent_activity_preview.html" },
        { id: "anniversary", label: "纪念日", file: "anniversary.html" }
      ];
      const fileToPage = Object.fromEntries(routes.map(route => [route.file, route.id]));
      const tabs = document.getElementById("tabs");
      const frame = document.getElementById("frame");
      const transition = document.getElementById("transition");
      let currentPage = normalizePage(new URLSearchParams(location.search).get("page"));
      let transitionTimer = 0;

      function normalizePage(page, route) {
        if (routes.some(item => item.id === page)) return page;
        const file = String(route || "").split("?")[0].replace(/^\.\//, "");
        return fileToPage[file] || "home";
      }

      function renderTabs() {
        tabs.innerHTML = routes.map(route =>
          `<button class="tab ${route.id === currentPage ? "active" : ""}" data-page="${route.id}">${route.label}</button>`
        ).join("");
        tabs.querySelectorAll("[data-page]").forEach(button => {
          button.addEventListener("click", () => navigate(button.dataset.page));
        });
      }

      function frameUrl(page) {
        const route = routes.find(item => item.id === page) || routes[0];
        return `${route.file}?embedded=1&v=${Date.now()}`;
      }

      function syncAddress(page, replace) {
        const url = new URL(location.href);
        url.searchParams.set("page", page);
        history[replace ? "replaceState" : "pushState"]({ page }, "", url);
      }

      function showTransition() {
        clearTimeout(transitionTimer);
        transition.classList.add("show");
        transitionTimer = setTimeout(() => transition.classList.remove("show"), 210);
      }

      function navigate(page, options = {}) {
        const nextPage = normalizePage(page, options.route);
        const shouldReload = nextPage !== currentPage || options.force;
        currentPage = nextPage;
        renderTabs();
        if (shouldReload) {
          showTransition();
          frame.src = frameUrl(currentPage);
        }
        syncAddress(currentPage, Boolean(options.replace));
      }

      function injectEmbeddedStyle() {
        let doc;
        try { doc = frame.contentDocument || frame.contentWindow.document; } catch (_) { return; }
        if (!doc?.head || doc.getElementById("secretbase-embedded-style")) return;
        const style = doc.createElement("style");
        style.id = "secretbase-embedded-style";
        style.textContent = `
          html,body{width:100%!important;height:100%!important;min-height:100%!important;margin:0!important;padding:0!important;overflow:hidden!important;background:#fff7f8!important}
          .phone{width:100%!important;height:100%!important;min-height:0!important;margin:0!important;border:0!important;border-radius:0!important;box-shadow:none!important}
          .scroll,.screen{height:100%!important;min-height:0!important;overflow:auto!important;overscroll-behavior:contain!important;scrollbar-width:none}
          .scroll::-webkit-scrollbar,.screen::-webkit-scrollbar{display:none}
          .preview-badge{display:none!important}
        `;
        doc.head.appendChild(style);
      }

      frame.addEventListener("load", () => {
        injectEmbeddedStyle();
        setTimeout(injectEmbeddedStyle, 250);
        transition.classList.remove("show");
      });

      window.addEventListener("message", event => {
        if (event.source !== frame.contentWindow || event.data?.type !== "secretbase-preview:navigate") return;
        navigate(event.data.page, { route: event.data.route });
      });

      window.addEventListener("popstate", event => {
        currentPage = normalizePage(event.state?.page || new URLSearchParams(location.search).get("page"));
        renderTabs();
        showTransition();
        frame.src = frameUrl(currentPage);
      });

      renderTabs();
      frame.src = frameUrl(currentPage);
      syncAddress(currentPage, true);
    })();
  </script>
</body>
</html>
