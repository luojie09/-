<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>我们的秘密基地 - 首页预览</title>
  <style>
    :root{
      --bg:#fffbfa;
      --hero-start:#ffeef3;
      --hero-middle:#fff7f8;
      --hero-end:#fffbfa;
      --surface:rgba(255,255,255,.98);
      --primary:#ff6f95;
      --primary-soft:#ffd8e4;
      --primary-strong:#ffb7cc;
      --ink:#1f2024;
      --muted:#8c8892;
      --line:#f3dfe6;
      --shadow:0 14px 34px rgba(122,57,73,.10);
    }

    *{box-sizing:border-box}
    html,body{margin:0;background:#f4f1f2;font-family:"PingFang SC","Microsoft YaHei","Segoe UI",sans-serif;color:var(--ink)}
    body{min-height:100vh;display:flex;justify-content:center;padding:24px 12px}

    .phone{
      width:min(100%,430px);
      min-height:calc(100vh - 48px);
      background:var(--bg);
      border-radius:36px;
      overflow:hidden;
      position:relative;
      box-shadow:0 24px 60px rgba(60,34,42,.16);
      border:1px solid rgba(255,255,255,.85);
    }

    .scroll{
      min-height:100%;
      padding-bottom:110px;
    }

    .hero-section{
      position:relative;
      background:linear-gradient(180deg,var(--hero-start),var(--hero-middle),var(--hero-end));
      padding-bottom:0;
    }

    .hero-inner{
      padding:calc(18px + env(safe-area-inset-top)) 16px 0;
    }

    .statusbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-weight:800;
      font-size:20px;
      margin-bottom:14px;
    }

    .status-icons{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .status-pill{
      width:18px;
      height:12px;
      border-radius:3px;
      background:#1c1e22;
      opacity:.88;
    }

    .header{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
    }

    .greeting{
      font-family:"Baskerville","Times New Roman","STSong","Songti SC","SimSun","Noto Serif SC",serif;
      font-size:17px;
      font-weight:600;
      letter-spacing:.02em;
      margin-bottom:6px;
      color:var(--muted);
    }

    .names{
      margin:0;
      display:flex;
      align-items:flex-end;
      gap:6px;
      margin-top:2px;
    }

    .name-cn{
      font-family:"STSong","Songti SC","SimSun","Noto Serif SC",serif;
      font-size:34px;
      line-height:1.1;
      font-weight:700;
      letter-spacing:0;
    }

    .name-and{
      font-size:24px;
      line-height:1.2;
      font-weight:500;
      color:rgba(31,32,36,.82);
      transform:translateY(-3px);
    }

    .top-actions{
      display:flex;
      gap:12px;
      padding-top:6px;
    }

    .icon-btn{
      width:48px;
      height:48px;
      border-radius:50%;
      border:1px solid rgba(243,223,230,.9);
      background:rgba(255,255,255,.92);
      display:grid;
      place-items:center;
      box-shadow:0 8px 18px rgba(122,57,73,.08);
      position:relative;
    }

    .icon-btn img{
      width:24px;
      height:24px;
      object-fit:contain;
    }

    .dot{
      position:absolute;
      right:4px;
      top:4px;
      width:12px;
      height:12px;
      border-radius:50%;
      background:var(--primary);
      border:2px solid #fff;
    }

    .hero-illustration{
      position:relative;
      height:246px;
      margin-top:2px;
    }

    .hero-illustration img{
      position:absolute;
      left:12px;
      right:12px;
      bottom:0;
      width:calc(100% - 24px);
      height:100%;
      object-fit:contain;
      object-position:center bottom;
    }

    .hero-fade{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      height:72px;
      background:linear-gradient(180deg,rgba(255,251,250,0),var(--hero-end));
    }

    .relationship-wrap{
      margin-top:-24px;
      padding:0 16px;
      position:relative;
      z-index:3;
    }

    .relationship{
      background:var(--surface);
      border:1px solid rgba(243,223,230,.92);
      box-shadow:var(--shadow);
      border-radius:28px;
      padding:18px 18px 14px;
      position:relative;
    }

    .eyebrow{
      text-align:left;
      font-size:12px;
      line-height:16px;
      font-weight:700;
      margin:0;
      color:var(--muted);
      display:inline-block;
      padding:4px 8px;
      border-radius:999px;
      background:#eaf4ff;
    }

    .days{
      display:flex;
      align-items:flex-end;
      gap:8px;
      line-height:1;
    }

    .days-value{
      font-family:"Comic Sans MS","Marker Felt","Segoe Print","Bradley Hand",cursive;
      font-size:76px;
      font-weight:700;
      letter-spacing:-3px;
      line-height:1;
    }

    .days-unit{
      font-size:24px;
      font-weight:800;
      padding-bottom:12px;
    }

    .relationship-hero{
      position:relative;
      min-height:116px;
      padding-top:2px;
    }

    .relationship-hero .days{
      position:absolute;
      left:50%;
      top:63%;
      transform:translate(-50%,-50%);
    }

    .relationship-meta-top{
      position:absolute;
      left:0;
      top:0;
    }

    .anniversary{
      margin-top:14px;
      border-radius:20px;
      padding:13px 14px;
      background:rgba(255,255,255,.72);
    }

    .ann-row{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
    }

    .ann-copy{
      flex:1;
    }

    .ann-label{
      font-size:13px;
      font-weight:800;
      color:var(--muted);
      margin-bottom:2px;
    }

    .ann-title{
      font-size:16px;
      font-weight:700;
    }

    .ann-remain{
      white-space:nowrap;
      font-size:13px;
      font-weight:500;
      padding:5px 10px;
      border-radius:999px;
      background:rgba(255,216,228,.34);
    }

    .progress{
      margin-top:6px;
      height:6px;
      border-radius:999px;
      background:rgba(255,216,228,.3);
      overflow:hidden;
    }

    .progress span{
      display:block;
      height:100%;
      width:0;
      border-radius:inherit;
      background:linear-gradient(90deg,rgba(255,111,149,.78),rgba(255,183,204,.72));
    }

    .content{
      padding:16px 16px 0;
    }

    .moods{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .mood-card,
    .quick,
    .feature,
    .activity-list{
      background:var(--surface);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
    }

    .mood-card{
      border-radius:22px;
      padding:14px 16px;
      display:flex;
      align-items:center;
      gap:12px;
      min-height:82px;
    }

    .mood-copy{
      display:flex;
      flex-direction:column;
      gap:4px;
      min-width:0;
    }

    .mood-name{
      font-size:13px;
      font-weight:800;
      color:var(--muted);
      margin:0;
    }

    .avatar{
      width:54px;
      height:54px;
      border-radius:50%;
      object-fit:cover;
      background:#fff;
      flex:none;
    }

    .mood-main{
      font-size:18px;
      font-weight:900;
      margin:0;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .mood-emoji{
      margin-left:auto;
      font-size:28px;
    }

    .quick{
      margin-top:16px;
      border-radius:26px;
      padding:16px;
      display:block;
    }

    .quick-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:12px;
    }

    .quick-label{
      color:var(--muted);
      font-size:13px;
      font-weight:800;
    }

    .quick-shell{
      background:#fff4f6;
      border:1px solid rgba(243,223,230,.92);
      border-radius:20px;
      padding:15px 16px;
    }

    .quick-input{
      color:var(--muted);
      font-size:16px;
      font-weight:600;
    }

    .quick-actions{
      display:flex;
      gap:8px;
    }

    .quick-action-btn{
      width:38px;
      height:38px;
      border-radius:16px;
      border:1px solid rgba(243,223,230,.92);
      background:#fff4f6;
      display:grid;
      place-items:center;
    }

    .quick-actions img{
      width:22px;
      height:22px;
      object-fit:contain;
    }

    .section-title{
      margin:26px 2px 14px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .section-title h2{
      margin:0;
      font-size:22px;
      font-weight:900;
    }

    .section-title a{
      color:var(--muted);
      text-decoration:none;
      font-size:15px;
      font-weight:700;
    }

    .feature-grid{
      display:grid;
      grid-template-columns:repeat(2, 1fr);
      gap:12px;
    }

    .feature{
      min-height:152px;
      border-radius:24px;
      padding:16px;
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
    }

    .feature.accent{
      background:#fff4f6;
    }

    .feature.cream{
      background:#fffcf4;
    }

    .feature.blush{
      background:#fff7fb;
    }

    .feature.mint{
      background:#fbfff8;
    }

    .feature-top{
      width:100%;
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
    }

    .feature-icon{
      width:52px;
      height:52px;
      border-radius:18px;
      background:rgba(255,255,255,.82);
      display:grid;
      place-items:center;
    }

    .feature-badge{
      padding:6px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.72);
      color:var(--muted);
      font-size:13px;
      font-weight:800;
      white-space:nowrap;
    }

    .feature img{
      width:36px;
      height:36px;
      object-fit:contain;
    }

    .feature strong{
      display:block;
      font-size:18px;
      font-weight:900;
    }

    .feature small{
      display:block;
      font-size:14px;
      font-weight:700;
      color:var(--muted);
    }

    .feature-bottom{
      width:100%;
      display:flex;
      justify-content:flex-end;
    }

    .feature-arrow{
      width:28px;
      height:28px;
      border-radius:50%;
      background:rgba(255,255,255,.88);
      color:var(--muted);
      display:grid;
      place-items:center;
      font-size:18px;
      font-weight:800;
    }

    .activity-list{
      border-radius:24px;
      padding:6px 14px;
      margin-bottom:16px;
    }

    .activity{
      display:grid;
      grid-template-columns:14px 56px 1fr 20px;
      gap:12px;
      align-items:center;
      padding:12px 0;
    }

    .activity + .activity{
      border-top:1px solid rgba(243,223,230,.92);
    }

    .activity-dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:var(--primary);
      justify-self:center;
    }

    .activity-thumb{
      width:56px;
      height:56px;
      border-radius:16px;
      object-fit:cover;
      background:#fff;
    }

    .activity-title{
      font-size:16px;
      font-weight:900;
      margin-bottom:4px;
    }

    .activity-time{
      font-size:13px;
      color:var(--muted);
      font-weight:700;
    }

    .chevron{
      color:#bbb2b7;
      font-size:22px;
      font-weight:800;
      text-align:right;
    }

    .bottom-nav{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      padding:10px 12px calc(12px + env(safe-area-inset-bottom));
      background:rgba(255,255,255,.96);
      border-top:1px solid rgba(243,223,230,.92);
      border-radius:28px 28px 0 0;
      box-shadow:0 -12px 34px rgba(60,34,42,.08);
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:4px;
    }

    .nav-item{
      text-align:center;
      color:#7f7980;
      font-size:13px;
      font-weight:700;
    }

    .nav-item.active{
      color:var(--primary);
    }

    .nav-item img{
      width:30px;
      height:30px;
      object-fit:contain;
      display:block;
      margin:0 auto 4px;
    }

    .preview-badge{
      position:absolute;
      right:14px;
      top:16px;
      z-index:5;
      font-size:11px;
      font-weight:800;
      color:#a35c6f;
      background:rgba(255,255,255,.8);
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(243,223,230,.92);
      backdrop-filter:blur(10px);
    }

    @media (max-width:380px){
      .names{font-size:34px}
      .days-value{font-size:74px}
      .hero-illustration img{
        left:8px;
        right:8px;
        width:calc(100% - 16px);
      }
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="preview-badge">静态预览</div>
    <div class="scroll">
      <section class="hero-section">
        <div class="hero-inner">
          <div class="statusbar">
            <span id="statusTime">9:41</span>
            <div class="status-icons">
              <span class="status-pill" style="width:14px"></span>
              <span class="status-pill" style="width:18px"></span>
              <span class="status-pill" style="width:22px"></span>
            </div>
          </div>

          <div class="header">
            <div>
              <div class="greeting" id="greeting">Good morning</div>
              <h1 class="names">
                <span class="name-cn">小羊</span>
                <span class="name-and">&amp;</span>
                <span class="name-cn">小耶</span>
              </h1>
            </div>
            <div class="top-actions">
              <div class="icon-btn">
                <span class="dot"></span>
                <img src="../app/src/main/res/drawable-nodpi/ic_message_bubble.png" alt="消息">
              </div>
              <div class="icon-btn">
                <img src="../app/src/main/res/drawable-nodpi/ic_settings_gear.png" alt="设置">
              </div>
            </div>
          </div>
        </div>

        <div class="hero-illustration">
          <img src="../app/src/main/res/drawable-nodpi/home_couple_hero.webp" alt="主视觉">
          <div class="hero-fade"></div>
        </div>

        <div class="relationship-wrap">
          <section class="relationship">
            <div class="relationship-hero">
              <div class="relationship-meta-top">
                <div class="eyebrow">我们已经在一起</div>
              </div>
              <div class="days">
                <span class="days-value" id="daysTogether">48</span>
                <span class="days-unit">天</span>
              </div>
            </div>
            <div class="anniversary">
              <div class="ann-row">
                <div class="ann-copy">
                  <div class="ann-label">下个纪念日</div>
                  <div class="ann-title" id="anniversaryTitle">恋爱一周年</div>
                </div>
                <span class="ann-remain" id="anniversaryRemain">还有 318 天</span>
              </div>
              <div class="progress"><span id="anniversaryProgress"></span></div>
            </div>
          </section>
        </div>
      </section>

      <div class="content">
        <div class="section-title">
          <h2>来玩呀！</h2>
        </div>
        <section class="feature-grid">
          <div class="feature blush">
            <div class="feature-top">
              <div class="feature-icon">
                <img src="../app/src/main/res/drawable-nodpi/ic_message_wall_card.png" alt="留言墙">
              </div>
              <div class="feature-badge">有留言</div>
            </div>
            <strong>留言墙</strong>
            <small>9条新消息</small>
            <div class="feature-bottom"><div class="feature-arrow">›</div></div>
          </div>
          <div class="feature cream">
            <div class="feature-top">
              <div class="feature-icon">
                <img src="../app/src/main/res/drawable-nodpi/ic_wishlist_card.png" alt="愿望清单">
              </div>
              <div class="feature-badge">想去做</div>
            </div>
            <strong>愿望清单</strong>
            <small>3 / 8 完成</small>
            <div class="feature-bottom"><div class="feature-arrow">›</div></div>
          </div>
          <div class="feature accent">
            <div class="feature-top">
              <div class="feature-icon">
                <img src="../app/src/main/res/drawable-nodpi/ic_anniversary_card.png" alt="纪念日">
              </div>
              <div class="feature-badge">倒数中</div>
            </div>
            <strong>纪念日</strong>
            <small id="featureAnniversary">318天后</small>
            <div class="feature-bottom"><div class="feature-arrow">›</div></div>
          </div>
          <div class="feature mint">
            <div class="feature-top">
              <div class="feature-icon">
                <img src="../app/src/main/res/drawable-nodpi/ic_task_card.png" alt="挑战任务">
              </div>
              <div class="feature-badge">一起冲</div>
            </div>
            <strong>挑战任务</strong>
            <small>2项进行中</small>
            <div class="feature-bottom"><div class="feature-arrow">›</div></div>
          </div>
        </section>

        <div class="section-title">
          <h2>最近动态</h2>
          <a href="javascript:void(0)">查看全部</a>
        </div>
        <section class="activity-list">
          <div class="activity">
            <span class="activity-dot"></span>
            <img class="activity-thumb" src="../app/src/main/res/drawable-nodpi/ic_activity_photo.png" alt="照片">
            <div>
              <div class="activity-title">小耶上传了 3 张新照</div>
              <div class="activity-time">2小时前</div>
            </div>
            <div class="chevron">›</div>
          </div>
          <div class="activity">
            <span class="activity-dot"></span>
            <img class="activity-thumb" src="../app/src/main/res/drawable-nodpi/ic_activity_checklist.png" alt="清单">
            <div>
              <div class="activity-title">完成了愿望清单中的「看海」</div>
              <div class="activity-time">昨天</div>
            </div>
            <div class="chevron">›</div>
          </div>
        </section>
      </div>
    </div>

    <nav class="bottom-nav">
      <div class="nav-item active">
        <img src="../app/src/main/res/drawable-nodpi/ic_home_nav_active.png" alt="首页">
        首页
      </div>
      <div class="nav-item">
        <img src="../app/src/main/res/drawable-nodpi/ic_calendar_nav.png" alt="纪念日">
        纪念日
      </div>
      <div class="nav-item">
        <img src="../app/src/main/res/drawable-nodpi/ic_album_nav.png" alt="相册">
        相册
      </div>
      <div class="nav-item">
        <img src="../app/src/main/res/drawable-nodpi/ic_profile_nav.png" alt="我的">
        我的
      </div>
    </nav>
  </div>

  <script>
    const START_DATE = new Date('2026-05-06T00:00:00');

    function startOfDay(date) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function diffDays(a, b) {
      return Math.round((startOfDay(a) - startOfDay(b)) / 86400000);
    }

    function toChineseNumber(value) {
      const digits = ['零','一','二','三','四','五','六','七','八','九'];
      if (value < 10) return digits[value];
      if (value < 20) return '十' + (value === 10 ? '' : digits[value % 10]);
      if (value < 100) return digits[Math.floor(value / 10)] + '十' + (value % 10 === 0 ? '' : digits[value % 10]);
      return String(value);
    }

    function updateClock() {
      const now = new Date();
      document.getElementById('statusTime').textContent =
        now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0');
      const hour = now.getHours();
      document.getElementById('greeting').textContent =
        hour >= 5 && hour < 12 ? 'Good morning' : hour >= 12 && hour < 18 ? 'Good afternoon' : 'Good evening';
    }

    function updateRelationship() {
      const today = startOfDay(new Date());
      const daysTogether = Math.max(1, diffDays(today, START_DATE) + 1);
      document.getElementById('daysTogether').textContent = daysTogether;

      let anniversaryThisYear = new Date(today.getFullYear(), 4, 6);
      let nextAnniversary;
      if (today < anniversaryThisYear) {
        nextAnniversary = anniversaryThisYear;
      } else if (today > anniversaryThisYear) {
        nextAnniversary = new Date(today.getFullYear() + 1, 4, 6);
      } else if (today.getFullYear() === 2026) {
        nextAnniversary = new Date(today.getFullYear() + 1, 4, 6);
      } else {
        nextAnniversary = anniversaryThisYear;
      }

      const cycleStart = START_DATE > new Date(nextAnniversary.getFullYear() - 1, 4, 6)
        ? START_DATE
        : new Date(nextAnniversary.getFullYear() - 1, 4, 6);

      const remain = diffDays(nextAnniversary, today);
      const years = Math.max(1, nextAnniversary.getFullYear() - 2026);
      const cycleTotal = Math.max(1, diffDays(nextAnniversary, cycleStart));
      const cycleElapsed = Math.max(0, Math.min(cycleTotal, diffDays(today, cycleStart)));

      document.getElementById('anniversaryTitle').textContent = `恋爱${toChineseNumber(years)}周年`;
      document.getElementById('anniversaryRemain').textContent = remain === 0 ? '就是今天' : `还有 ${remain} 天`;
      document.getElementById('featureAnniversary').textContent = remain === 0 ? '就是今天' : `${remain}天后`;
      document.getElementById('anniversaryProgress').style.width = `${(cycleElapsed / cycleTotal) * 100}%`;
    }

    updateClock();
    updateRelationship();
    setInterval(updateClock, 30000);
  </script>
</body>
</html>
