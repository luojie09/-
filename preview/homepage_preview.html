<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>我们的秘密基地 - 首页预览</title>
  <link rel="stylesheet" href="./secretbase-preview.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@500;600;700&family=Playfair+Display:wght@500;600;700&display=swap');

    :root{
      --page:#f5f1f2;
      --bg:#fff4f7;
      --hero-start:#ffe4ec;
      --hero-middle:#fff0f4;
      --hero-end:#fff4f7;
      --surface:#fff;
      --surface-soft:rgba(255,255,255,.78);
      --ink:#1f2024;
      --muted:#8f8991;
      --line:rgba(243,223,230,.72);
      --accent:#ff6f95;
      --accent-soft:#ffe2ea;
      --shadow:0 10px 26px rgba(84,54,62,.07);
      --shadow-soft:0 6px 18px rgba(84,54,62,.055);
      --font-body:"Inter","Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;
      --font-heading:"Playfair Display","Noto Serif SC","PingFang SC","Microsoft YaHei",serif;
      --font-song:"Songti SC","STSong","SimSun","Noto Serif SC",serif;
      --font-number:var(--font-body);
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      background:var(--page);
      font-family:var(--font-body);
      color:var(--ink);
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
      font-kerning:normal;
    }
    body{min-height:100vh;display:flex;justify-content:center;padding:24px 12px}

    .phone{
      width:min(100%,430px);
      height:calc(100vh - 48px);
      min-height:0;
      background:linear-gradient(180deg,var(--hero-start) 0%,var(--hero-middle) 44%,var(--hero-end) 100%);
      border-radius:36px;
      overflow:hidden;
      position:relative;
      border:1px solid rgba(255,255,255,.88);
      box-shadow:0 24px 60px rgba(58,39,46,.12);
    }

    .scroll{
      height:100%;
      overflow:auto;
      padding-bottom:108px;
    }

    .hero{
      background:linear-gradient(180deg,var(--hero-start),var(--hero-middle),var(--hero-end));
    }

    .hero-inner{
      padding:calc(18px + env(safe-area-inset-top)) 20px 0;
    }

    .statusbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size:20px;
      font-weight:800;
      margin-bottom:16px;
      font-family:var(--font-number);
      font-variant-numeric:tabular-nums;
    }

    .status-icons{display:flex;align-items:center;gap:8px}
    .status-pill{
      height:12px;
      border-radius:3px;
      background:#1c1e22;
      opacity:.9;
    }

    .header{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
    }

    .greeting{
      margin:0 0 4px;
      font-size:14px;
      line-height:18px;
      font-weight:700;
      letter-spacing:0;
      color:var(--muted);
    }

    .names{
      margin:0;
      display:flex;
      align-items:center;
      gap:5px;
      line-height:36px;
      font-size:32px;
      font-family:var(--font-song);
      font-weight:800;
      letter-spacing:-.02em;
    }

    .name-heart{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-family:"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif;
      font-size:20px;
      line-height:1;
      transform:translateY(-2px);
    }

    .hero-illustration{
      position:relative;
      height:250px;
      margin-top:4px;
      overflow:hidden;
    }

    .hero-illustration img{
      position:absolute;
      left:-12px;
      right:-12px;
      bottom:0;
      width:calc(100% + 24px);
      height:100%;
      object-fit:contain;
      object-position:center bottom;
      transform:scale(.9);
      transform-origin:center bottom;
      transition:opacity .45s ease;
    }

    .hero-fade{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      height:64px;
      background:linear-gradient(180deg,rgba(255,251,250,0),var(--hero-end));
    }

    .relationship-wrap{
      margin-top:6px;
      padding:0 20px;
      position:relative;
      z-index:2;
    }

    .relationship{
      background:#fff;
      border:0;
      border-radius:26px;
      box-shadow:var(--shadow);
      padding:18px;
    }

    .relationship-top{
      text-align:center;
    }

    .relationship-label{
      font-size:13px;
      line-height:18px;
      font-weight:700;
      letter-spacing:.01em;
      color:var(--muted);
      margin-bottom:8px;
    }

    .days{
      display:flex;
      justify-content:center;
      align-items:flex-end;
      gap:4px;
      line-height:1;
    }

    .days-value{
      font-size:52px;
      line-height:52px;
      font-family:var(--font-number);
      font-weight:800;
      letter-spacing:-.03em;
      font-variant-numeric:tabular-nums;
    }

    .days-unit{
      font-size:18px;
      line-height:22px;
      font-weight:700;
      padding-bottom:7px;
    }

    .start-date{
      margin-top:8px;
      font-size:14px;
      line-height:20px;
      color:var(--muted);
      font-weight:700;
      font-family:var(--font-number);
      font-variant-numeric:tabular-nums;
    }

    .divider{
      height:1px;
      background:var(--line);
      margin:16px 0;
    }

    .anniversary-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
    }

    .anniversary-copy{
      flex:1;
    }

    .anniversary-label{
      font-size:13px;
      line-height:18px;
      font-weight:700;
      color:var(--muted);
      margin-bottom:3px;
    }

    .anniversary-title{
      font-size:17px;
      line-height:22px;
      font-family:var(--font-heading);
      font-weight:800;
      letter-spacing:-.012em;
    }

    .anniversary-remain{
      white-space:nowrap;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(255,226,234,.74);
      font-size:13px;
      line-height:18px;
      font-weight:700;
      font-family:var(--font-number);
      font-variant-numeric:tabular-nums;
    }

    .progress{
      margin-top:12px;
      height:6px;
      border-radius:999px;
      background:rgba(255,226,234,.74);
      overflow:hidden;
    }

    .progress span{
      display:block;
      height:100%;
      width:0;
      border-radius:inherit;
      background:linear-gradient(90deg,rgba(255,111,149,.72),rgba(255,183,204,.64));
    }

    .content{
      padding:22px 20px 0;
    }

    .section{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:12px;
    }

    .section h2{
      margin:0;
      font-size:22px;
      line-height:28px;
      font-family:var(--font-heading);
      font-weight:700;
      letter-spacing:-.012em;
    }

    .section a{
      color:var(--muted);
      text-decoration:none;
      font-size:14px;
      line-height:20px;
      font-weight:600;
    }

    .feature-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
    }

    .feature{
      min-height:104px;
      padding:16px;
      border-radius:22px;
      background:#fff;
      border:0;
      box-shadow:var(--shadow-soft);
      display:flex;
      flex-direction:column;
      gap:12px;
      cursor:pointer;
    }

    .feature.wall,
    .feature.wish,
    .feature.day,
    .feature.task{background:#fff}

    .feature-head{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .feature-icon{
      width:36px;
      height:36px;
      border-radius:16px;
      display:grid;
      place-items:center;
      background:rgba(255,255,255,.78);
    }

    .feature-icon img{
      width:24px;
      height:24px;
      object-fit:contain;
    }

    .feature strong{
      display:block;
      font-size:18px;
      line-height:24px;
      font-family:var(--font-heading);
      font-weight:800;
      letter-spacing:-.008em;
      margin-bottom:0;
      min-width:0;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .feature small{
      display:block;
      font-size:15px;
      line-height:22px;
      font-weight:700;
      color:var(--muted);
      padding-left:8px;
    }

    .activity-card{
      margin-top:22px;
      background:var(--surface);
      border:0;
      box-shadow:var(--shadow-soft);
      border-radius:24px;
      padding:6px 16px;
    }

    .activity-view-all{
      display:block;
      text-align:center;
      color:var(--muted);
      text-decoration:none;
      font-size:14px;
      line-height:20px;
      font-weight:700;
      padding:12px 0;
      border-top:1px solid var(--line);
    }

    .activity{
      position:relative;
      display:flex;
      align-items:center;
      gap:12px;
      padding:12px 0;
      cursor:pointer;
    }

    .activity + .activity::before{
      content:"";
      position:absolute;
      left:0;
      right:0;
      top:0;
      height:1px;
      background:var(--line);
    }

    .activity-thumb{
      width:52px;
      height:52px;
      border-radius:16px;
      object-fit:contain;
      background:#fff;
      border:0;
      padding:10px;
      flex:none;
    }

    .activity-copy{
      flex:1;
      min-width:0;
    }

    .activity-title{
      font-size:17px;
      line-height:24px;
      font-family:var(--font-heading);
      font-weight:800;
      letter-spacing:-.008em;
      margin-bottom:4px;
    }

    .activity-time{
      font-size:14px;
      line-height:20px;
      color:var(--muted);
      font-weight:700;
      font-family:var(--font-number);
      font-variant-numeric:tabular-nums;
    }

    .activity-arrow{
      color:var(--muted);
      font-size:24px;
      font-weight:700;
      line-height:1;
    }

    .bottom-nav{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      padding:8px 10px calc(10px + env(safe-area-inset-bottom));
      background:rgba(255,255,255,.96);
      border-top:1px solid var(--line);
      border-radius:26px 26px 0 0;
      box-shadow:0 -4px 14px rgba(58,39,46,.04);
      display:grid;
      grid-template-columns:repeat(4,1fr);
    }

    .nav-item{
      text-align:center;
      color:#8f8991;
      font-size:12px;
      line-height:16px;
      font-weight:700;
      padding:6px 4px;
      cursor:pointer;
    }

    .nav-item.active{
      color:var(--accent);
      font-weight:800;
    }

    .nav-item img{
      display:block;
      width:24px;
      height:24px;
      margin:0 auto 4px;
      object-fit:contain;
    }

    @media (max-width:380px){
      .hero-illustration img{
        left:-6px;
        right:-6px;
        width:calc(100% + 12px);
      }
      .names{font-size:30px;line-height:34px}
      .days-value{font-size:48px}
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="scroll">
      <section class="hero">
        <div class="hero-inner">
          <div class="statusbar">
            <span id="statusTime">9:41</span>
            <div class="status-icons">
              <span class="status-pill" style="width:14px"></span>
              <span class="status-pill" style="width:18px"></span>
              <span class="status-pill" style="width:22px"></span>
            </div>
          </div>

          <div class="header">
            <div>
              <p class="greeting" id="greeting">Good morning</p>
              <h1 class="names">
                <span>小羊</span>
                <span class="name-heart">❤️</span>

              </h1>
            </div>

        </div>

        <div class="hero-illustration">
          <img id="heroCarouselImage" src="../app/src/main/res/drawable-nodpi/home_carousel_current.png" alt="小羊和小耶">
          <div class="hero-fade"></div>
        </div>

        <div class="relationship-wrap">
          <section class="relationship">
            <div class="relationship-top">
              <div class="relationship-label">我们已经在一起</div>
              <div class="days">
                <span class="days-value" id="daysTogether">48</span>
                <span class="days-unit">天</span>
              </div>
              <div class="start-date"><span id="startDate">2026.05.06 星期三</span></div>
            </div>

            <div class="divider"></div>

            <div class="anniversary-row">
              <div class="anniversary-copy">
                <div class="anniversary-label">下个纪念日</div>
                <div class="anniversary-title" id="anniversaryTitle">恋爱一周年</div>
              </div>
              <div class="anniversary-remain" id="anniversaryRemain">还有 318 天</div>

            <div class="progress"><span id="anniversaryProgress"></span></div>

      </section>

      <div class="content">
        <div class="section">
          <h2>最近动态</h2>
        </div>

        <section class="activity-card">
          <div class="activity" data-route="./message_wall_preview.html">
            <img class="activity-thumb" src="../app/src/main/res/drawable-nodpi/ic_activity_photo.png" alt="照片">

              <div class="activity-title">小耶上传了 3 张新照</div>

          <div class="activity" data-route="./wish_list.html">

            <div class="activity-copy">
              <div class="activity-title">完成了愿望清单中的「看海」</div>
              <div class="activity-time">昨天</div>

      </div>
    </div>

    <nav class="bottom-nav">
      <div class="nav-item active" data-route="./homepage_preview.html">
        <img src="../app/src/main/res/drawable-nodpi/ic_home_nav_active.png" alt="首页">
        首页
      </div>
      <div class="nav-item" data-route="./message_wall_preview.html">
        <img src="../app/src/main/res/drawable-nodpi/ic_message_wall_card.png" alt="留言墙">
        留言墙
      </div>
      <div class="nav-item" data-route="./wish_list.html">
        <img src="../app/src/main/res/drawable-nodpi/ic_wishlist_card.png" alt="愿望清单">
        愿望清单
      </div>
      <div class="nav-item" data-route="./anniversary.html">
        <img src="../app/src/main/res/drawable-nodpi/ic_calendar_nav.png" alt="纪念日">
        纪念日
      </div>
    </nav>
  </div>

  <script>
    const START_DATE = new Date("2026-05-06T00:00:00");

    function startOfDay(date) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function diffDays(a, b) {
      return Math.round((startOfDay(a) - startOfDay(b)) / 86400000);
    }

    function toChineseNumber(value) {
      const digits = ["零","一","二","三","四","五","六","七","八","九"];
      if (value < 10) return digits[value];
      if (value < 20) return "十" + (value === 10 ? "" : digits[value % 10]);
      if (value < 100) return digits[Math.floor(value / 10)] + "十" + (value % 10 === 0 ? "" : digits[value % 10]);
      return String(value);
    }

    function updateClock() {
      const now = new Date();
      document.getElementById("statusTime").textContent =
        `${now.getHours()}:${String(now.getMinutes()).padStart(2, "0")}`;

      const hour = now.getHours();
      document.getElementById("greeting").textContent =
        hour >= 5 && hour < 12 ? "Good morning" : hour >= 12 && hour < 18 ? "Good afternoon" : "Good evening";
    }

    function updateRelationship() {
      const today = startOfDay(new Date());
      const daysTogether = Math.max(1, diffDays(today, START_DATE) + 1);
      document.getElementById("daysTogether").textContent = daysTogether;

      const anniversaryThisYear = new Date(today.getFullYear(), 4, 6);
      const fallbackDate = today < anniversaryThisYear
        ? anniversaryThisYear
        : new Date(today.getFullYear() + 1, 4, 6);
      const fallbackYears = Math.max(1, fallbackDate.getFullYear() - 2026);
      let nextEvent = {
        title: `恋爱${toChineseNumber(fallbackYears)}周年`,
        date: fallbackDate,
        cycleStart: new Date(fallbackDate.getFullYear() - 1, 4, 6)
      };

      try {
        const items = JSON.parse(localStorage.getItem("secretbase-preview-anniversaries-v1") || "[]");
        const candidates = Array.isArray(items) ? items.map(item => {
          const [year, month, day] = String(item.date || "").split("-").map(Number);
          if (!year || !month || !day) return null;
          const originalDate = new Date(year, month - 1, day);
          let effectiveDate = originalDate;
          if (item.repeatYearly) {
            effectiveDate = new Date(today.getFullYear(), month - 1, day);
            if (effectiveDate < today) effectiveDate = new Date(today.getFullYear() + 1, month - 1, day);
          } else if (effectiveDate < today) {
            return null;
          }
          const cycleStartCandidate = item.repeatYearly
            ? new Date(effectiveDate.getFullYear() - 1, month - 1, day)
            : originalDate;
          return {
            title: item.title,
            date: effectiveDate,
            cycleStart: cycleStartCandidate > START_DATE ? cycleStartCandidate : START_DATE,
            remain: diffDays(effectiveDate, today)
          };
        }).filter(Boolean) : [];
        candidates.sort((a, b) => a.remain - b.remain);
        if (candidates.length) nextEvent = candidates[0];
      } catch (_) {}

      const nextAnniversary = nextEvent.date;
      const cycleStart = nextEvent.cycleStart > START_DATE ? nextEvent.cycleStart : START_DATE;
      const remain = diffDays(nextAnniversary, today);
      const cycleTotal = Math.max(1, diffDays(nextAnniversary, cycleStart));
      const cycleElapsed = Math.max(0, Math.min(cycleTotal, diffDays(today, cycleStart)));

      const titleNode = document.getElementById("anniversaryTitle");
      if (titleNode) titleNode.textContent = nextEvent.title;
      const remainText = remain === 0 ? "\u5c31\u662f\u4eca\u5929" : `\u8fd8\u6709 ${remain} \u5929`;
      const remainNode = document.getElementById("anniversaryRemain");
      if (remainNode) remainNode.textContent = remainText;
      const featureNode = document.getElementById("featureAnniversary");
      if (featureNode) featureNode.textContent = remain === 0 ? "就是今天" : `${remain} 天后`;
      document.getElementById("anniversaryProgress").style.width = `${(cycleElapsed / cycleTotal) * 100}%`;
    }

    function openPreview(route) {
      if (!route) return;
      window.location.href = route;
    }

    updateClock();
    updateRelationship();
    setInterval(updateClock, 30000);

    document.querySelectorAll("[data-route]").forEach(node => {
      node.addEventListener("click", event => {
        if (event.target.tagName === "A") {
          event.preventDefault();
        }
        openPreview(node.dataset.route);
      });
    });

    document.querySelector(".relationship").addEventListener("click", () => {
      openPreview("./anniversary.html");
    });

    document.querySelector(".activity-view-all").addEventListener("click", event => {
      event.preventDefault();
      openPreview("./recent_activity_preview.html");
    });
  </script>
  <script>
    (() => {
      const routePageMap = {
        "./homepage_preview.html": "home",
        "./message_wall_preview.html": "messageWall",
        "./message_wall_editor_preview.html": "messageEditor",
        "./wish_list.html": "wishList",
          "./anniversary.html": "anniversary",
          "./recent_activity_preview.html": "recentActivity"
      };

      function bridgeRoute(route) {
        if (!route) return;
        const page = routePageMap[route] || null;
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({
            type: "secretbase-preview:navigate",
            page,
            route
          }, "*");
          return;
        }
        window.location.href = route;
      }

      function bindRouteClicks() {
        document.querySelectorAll("[data-route]").forEach(node => {
          node.addEventListener("click", event => {
            event.preventDefault();
            event.stopPropagation();
            bridgeRoute(node.dataset.route);
          }, true);
        });

        const relationship = document.querySelector(".relationship");
        if (relationship) {
          relationship.addEventListener("click", event => {
            event.preventDefault();
            bridgeRoute("./anniversary.html");
          }, true);
        }

        const activityViewAll = document.querySelector(".activity-view-all");
        if (activityViewAll) {
          activityViewAll.addEventListener("click", event => {
            event.preventDefault();
            bridgeRoute("./recent_activity_preview.html");
          }, true);
        }
      }

      function updateSafeRelationship() {
        const startDate = new Date("2026-05-06T00:00:00");
        const startOfDay = date => new Date(date.getFullYear(), date.getMonth(), date.getDate());
        const diffDays = (a, b) => Math.round((startOfDay(a) - startOfDay(b)) / 86400000);
        const today = startOfDay(new Date());
        const daysTogether = Math.max(1, diffDays(today, startDate) + 1);
        const daysNode = document.getElementById("daysTogether");
        if (daysNode) daysNode.textContent = daysTogether;

        const anniversaryThisYear = new Date(today.getFullYear(), 4, 6);
        const nextAnniversary = today <= anniversaryThisYear && today.getFullYear() !== 2026
          ? anniversaryThisYear
          : new Date(today.getFullYear() + 1, 4, 6);
        const remain = diffDays(nextAnniversary, today);
        const remainText = remain === 0 ? "\u5c31\u662f\u4eca\u5929" : `\u8fd8\u6709 ${remain} \u5929`;
        const remainNode = document.getElementById("anniversaryRemain");
        if (remainNode) remainNode.textContent = remainText;

        const progressNode = document.getElementById("anniversaryProgress");
        if (progressNode) {
          const cycleStart = new Date(nextAnniversary.getFullYear() - 1, 4, 6);
          const cycleTotal = Math.max(1, diffDays(nextAnniversary, cycleStart));
          const cycleElapsed = Math.max(0, Math.min(cycleTotal, diffDays(today, cycleStart)));
          progressNode.style.width = `${(cycleElapsed / cycleTotal) * 100}%`;
        }
      }

      function initHeroCarousel() {
        const image = document.getElementById("heroCarouselImage");
        if (!image) return;
        const images = [
          "../app/src/main/res/drawable-nodpi/home_carousel_current.png",
          "../app/src/main/res/drawable-nodpi/home_carousel_tree.png",
          "../app/src/main/res/drawable-nodpi/home_carousel_music.png",
          "../app/src/main/res/drawable-nodpi/home_carousel_cake.png",
          "../app/src/main/res/drawable-nodpi/home_carousel_picnic.png",
          "../app/src/main/res/drawable-nodpi/home_carousel_camp.png",
          "../app/src/main/res/drawable-nodpi/home_carousel_dance.png",
          "../app/src/main/res/drawable-nodpi/home_carousel_read.png"
        ];
        let index = 0;
        setInterval(() => {
          index = (index + 1) % images.length;
          image.style.opacity = "0";
          setTimeout(() => {
            image.src = images[index];
            image.style.opacity = "1";
          }, 240);
        }, 3000);
      }

      bindRouteClicks();
      updateRelationship();
      initHeroCarousel();
    })();
  </script>
</body>
</html>
