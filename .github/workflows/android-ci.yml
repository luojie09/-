name: Android CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-preview:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      JAVA_TOOL_OPTIONS: -Dfile.encoding=UTF-8
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Grant gradlew execute permission
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Assemble debug APK
        id: assemble
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Generate Compose preview screenshots
        if: ${{ steps.assemble.outcome == 'success' }}
        run: ./gradlew :app:updateDebugScreenshotTest --stacktrace

      - name: Validate Compose preview screenshots
        id: screenshot_test
        if: ${{ steps.assemble.outcome == 'success' }}
        continue-on-error: true
        run: ./gradlew :app:validateDebugScreenshotTest --stacktrace

      - name: Upload debug APK
        if: ${{ always() && steps.assemble.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload homepage preview artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: homepage-preview
          path: |
            app/build/reports/screenshotTest/preview/debug/**
            app/build/outputs/screenshotTest/**
          if-no-files-found: warn

      - name: Fail workflow when screenshot validation fails
        if: ${{ steps.screenshot_test.outcome == 'failure' }}
        run: exit 1
